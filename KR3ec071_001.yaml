body:
  text: 卷一山草部人參一真人參以遼東產者為勝連皮者色黃潤如防風去皮者堅白如粉肖人形有手足頭面畢具香有神故一名神草產於地質最厚處性微溫味甘兼味苦生時三丫五葉背陽向陰故頻見風日則易蛀陶貞白雲納新器中密封可經年不壞李言聞云凡生用宜㕮咀熟用宜隔紙焙之或醇酒潤透㕮咀焙熟並忌鐵器切片月池翁嘗著人參傳二卷言之甚詳不能備錄近代貨缺價昂假者皆以沙參薺苨桔梗採根造作亂之考沙參體虛無心而味淡薺苨體虛無心而味甘桔梗體堅有心而味苦而人參體堅有心而味甘味苦自有餘味煎之易爛而渣少氣味形色原自可辨所恨謀利之徒偽造混售以亂真品甚至因人參價貴有以短折長者謂之接貨以小並大者謂之合貨必先用水潮過原汁已出又用粉膠黏扎蒸烘做成力薄而易變又有以湯泡參自啜乃曬乾烘燥做色復售謂之湯參江淮所出土木人參多薺苨混充層出不窮欺人太甚今欲辨真偽不如用蘇頌之一法但使二人同走一含人參一空口度走三五里許其不含人參者必大喘含者氣息自如其人參乃真也然必使年歲體氣相若之人行之方准否則反至誤事夫富貴人平時衛生喜服人參誤服贗品雖無裨益尚未大害倘購假參以治大病則害立見非特不能升提中氣抑且反賊臟陰蓋薺苨桔梗沙參性皆降下如上損下損虛寒之體垂危之症服之則去生反速吾見亦多矣可不慎歟炳章按人參多年生草根也長者八九寸短者二三寸略似人形故名人參產吉林以野參為貴故又謂吉林參或曰野山參葉似掌狀複葉東陲遊記云遼東人參產寧古塔即今吉林寧安縣地四月發芽草本方梗對節生葉葉似秋海棠六七月開小白花花白如韭大者如碗小者如鍾八月結子若小豆而連環色正紅久之則黃而扁初生一丫四五年兩丫十年三丫久者四丫每丫五葉莖直上即扈從東遊日記所謂百丈杵也高者數尺余云考其產處有人工培植者有天然野生者如為鳳凰城及船廠產者種植為多而寧古塔產者野生為多總之人參野生歷年愈久性愈溫和其精力亦足因其吸天空清靜之氣足受地脈英靈之質厚故效力勝也吳謂泉云真野生人參山中少出今市肆所售皆秧種之類其秧種者將山地墾成墊土純用糞料培養之受氣不足故質不堅入水煎之參渣即爛嗅之亦無香味陰虧之證忌用故秧種一出而參價遂賤而野山真參更不可得也因野參採取難且出額少不使其年久滋養長大耳又且產參之山險峻多虎狼毒蛇故走山者常有傷生東陲遊記又云走山採參者多山東山西等省人每年三四月間趨之若鶩至九十月乃盡歸其組織以五人為伍內推一人為長號曰山頭陸行乘馬水行駕威弧以獨木雕成首尾皆銳沿松花江至諾尼江口登岸隨山頭至嶺乃分走叢林中尋參枝及葉其草一莖直上獨出眾草光與曉日相映得則跪而刨之日暮歸窠各出所得交山頭洗剔貫以長縷懸木曬乾或蒸而曬之曬乾後有大有小有紅有白土人貴紅而賤白大抵生者色白蒸熟則帶紅色近世以白者為貴名曰京參其體實而有心其味甘微兼苦自有餘味即野山真參是也龍江鄉土志云野山參有米珠在須其紋橫秧子參多順紋無米珠所謂秧種者即鳳凰城及船廠產者是也鳳凰城之貨形色白秀體松而瘦長皮色多皺紋皮熟者少味甜因用糖汁煮過無餘味近人所謂白抄參移山參太子參皆其類也船廠產者其地二百里內外所產較鳳凰城稍堅實且紅潤可觀味苦微甘其空松者亦多俗所謂廠參今俗名石渠子是也皆不道地如鄭君所言有沙參薺苨桔梗做充之品而近時則所未見未聞且人參形狀代有變態據近時辨之體態宜堅白皮宜細緊有橫皺紋蘆蒂宜凹陷丫節宜多丫節多年分多也味宜甘中兼苦要有清香氣而有回味方是上品否則皆屬側路不可不知也別直參二別直參即高麗參以野山所產為上品近日價值甚昂有以副野偽充者即新山所產也色白味淡紋稀虛寒之體服之作瀉且煎熬之後參片糜爛不比真者參片完固以此辨之便知真偽聞又有抄參糖參二種以之混充則殊礙衛生炳章按抄參糖參二種乃人參之種參前人參條下已辨明與別直不同別直產韓國即古之高麗其產參之地如京畿道之松都龍仁平安道之江界全羅道之錦山忠清道之忠州其間以松都產者為最勝紅參製造官廠在焉其地在韓京之北二十餘里四面皆山居北緯三十八度寒暑之差殊甚如松都產者以金剛山出者曰金剛參為最上品即今正官別直也而拳頭參次之且有官私之別紅白之分官參松都所產由義州出關加以重稅私參別處所出多偷漏出口故曰私也廣報云白參雖不行於內地而實則紅參鮮時亦是白參製成不過加附子水以釀其色價且較白參為昂及考其性紅參又遠不逮白參之和平故土人無食紅參者蓋別直雖為種品如歷年余久質味愈良古時每栽七年而採後則五年而採近世韓國割讓日本日人多精農學教以人工栽培速成之法三年即能採買故其受氣逐年薄弱而性味效能亦年不如年也凡辨真偽若真正官別體態圓方形而直蘆頭大與身混直而上皮面近蘆有細橫皺紋中身細直紋杈須則無紋味苦兼微甘鮮潔而有清香氣煎淘多次汁清而參仍不腐爛此為最上之品近時射利之徒多以廠參偽充即俗所為扁剛石渠子是也考廠參中身大蘆頭小頸細杈下亦粗圓而大皮紋直而粗味苦而兼澀煎淘汁混參亦腐化以此可辨偽贗品若廠參以礦灰同貯藏年餘參性受灰炕燥過度形質因此堅緻煎之亦汁清不烊其味仍苦兼澀總不若真別直質味之清香鮮潔也剪口參三偽名沖剪以太極參及大小稀頭尾假沖洋參剪口色白味不苦按剪口之貨吾省盛行才數年因參價錢昂貴市肆將洋參頭尾切下名為剪口昧者不知疏方竟用剪口參考諸本草未聞有剪口之藥今即洋參可用連類而成為愛惜物力起見孰料又有一種沖剪為之混亂耶奉勸醫家勿用病家勿購則不為沖參所誤耳炳章按剪口參種類甚多如參頭東條別折大尾中尾細尾夾尾之類是也所云剪口者乃是閩地藥家之命名耳鄭君所云洋參剪口者即東條也以東洋參之尾蒸熟乾之大尾中尾細尾夾尾等類皆從船廠參即石渠子扁剛參傍枝剪下以枝條之粗細分大中細夾等尾名目近今市售偽名別條是也又有別折一種以扁剛參之形態不正者剪去頭尾名曰參頭其中身名曰別折皆為側路藉以混亂別直參也若中虛者誤服之立時胸腹脹滿醫者不可不知也西洋參四西洋參皮色微黃者以小稀充之皮色純白者以沖白攙之其味不苦又以苦參煎湯浸而曬之虛寒之體誤服即瀉花旗所產又有一種肉色黃者價最貴竟以新山之太極參偽充之近人方劑喜用洋參若以貴价賣假藥且於病無益而有害洵堪浩嘆用者慎之炳章按西洋參形似遼參而小產於美國向來只有光白二種近時更增毛皮參一種因光參由日本人作偽以生料小東洋洋參擦去表皮名曰副光售與我國貪利市儈偽充西參以害同胞天良喪盡恥莫大焉蓋西參滋陰降火東參提氣助火效用相反凡是陰虛火旺勞嗽之人每用真西參則氣平火斂咳嗽漸平若用偽光參則反現面赤舌紅乾咳痰血口燥氣促諸危象焉以致醫者見西參有裹足不前之感故近年美商有不去表皮之毛西參運入我國意在杜絕某國狼人之作偽詎知通行未逾十年而某國原皮偽毛參又混售市上病家服藥可不慎歟偽西參之為害既如此而卒不能革除者何也因真西參之價每斤八九十元而偽參每斤僅八九元耳販賣真參者得利甚微混售偽參則利市十倍我國商人大抵目光淺短素少公眾道德觀念只知孳之為利不顧有害於民眾作偽者所以有如是之盛也至欲鑑別其真偽必須分氣味形色性質真光西參色白質輕性松氣清芬切片內層肉紋有細微菊花心之紋眼味初嚼則苦漸含則兼甘味口覺甚清爽氣味能久留口中若副光偽參色雖白質重而堅內層肉紋多實心無菊花心紋眼亦無清芬之氣嚼之初亦先苦後甘數咽後即淡而無味不若真者能久留口中毛西參皮紋深皺微灰黑色內肉鬆白質亦輕性松氣清芬味苦兼甘含咽清爽鮮潔為道地也偽毛參皮紋深陷質堅實味微苦中兼微甘後即淡而兼澀味黏舌者此即偽也如鄭君所謂苦參煎湯浸入亦非其本有之味也苟誤用之亦屬有害無益願衛生家注意之東洋參五以東陽新山所出之參皮肉俱白味淡不苦者偽充之虛寒之體不宜服服之則瀉按老山太極參產東洋皮色黃肉帶老黃扁而橫紋中有菊花心者為貴市肆所辦鳳記以上至旭記字號均皆可用價亦不昂用者當知所擇也炳章按東洋參為熟參之一種日本云州產者曰老山參會津產者曰新山參老山參形條邊圓或三角稜皮黃白色近梢處有紅點刺甘微苦兼微甘氣微香煎湯清而黃赤色者為道地新山參形條混圓皮色黃白而淡無紅刺點氣味較老山參淡薄耳又如日記一種形條雖極粗然色白無神味兼澀煎湯混濁如淡米泔切片貯藏能起白霜此種參出於陰山肥土用人工栽培二年即成為側路實不堪入藥用若老山參栽於陽面之山得天然陽氣最足凡陽虛氣陷久痢脫肛之症尚有寸效至於宇宙天鳳等記為名者非分高下實辨別枝條大小而作記號也新山老山皆以大小為記用者總以認識貨物辨明高下為主要亦不能以包袋為標準緣包袋可改換耳人參葉六人參葉乃遼東真參之葉氣清香味苦微甘其性補中帶表大能生胃津清暑氣降虛火利四肢頭目浸汁沐發能令光黑而不落醉後服之解酲第一以色不黃瘁綠翠如生手挪之有清甜香氣者真品也率多參客帶來餉客頗不易購市肆所售參葉不知何種樹葉偽充勿服為是炳章按項元麟云各種參葉形狀相似難分真偽然皆苦寒損氣敗血之物未可視為補藥此乃益中含損如麻黃髮汗根節反止汗之意趙恕軒云大率補者多在根葉乃枝節之餘氣不可以言補也參葉雖稟參之餘氣究其力止能行皮毛四肢性帶表散與參力遠甚近時婦人以參葉塞於發內能令光黑而不落醉後食之解酲云云未識驗否然觀近時市上通行者絕非樹葉偽充惟何參之葉且難斷定耳北沙參七偽名洋沙參色帶黃味辣不甜又有南沙參皮極粗條大味辣性味與北產相反按此沙參色白條小而結實氣味苦中帶甘故本經云微寒又云補中益肺氣於以上所述二種之偽品味既辛辣又安能補益乎炳章按北沙參山東日照縣故墩縣萊陽縣海南縣俱出海南出者條細質堅皮光潔色白鮮活潤澤為最佳萊陽出者質略鬆皮略糙白黃色亦佳日照故墩出者條粗質松皮糙黃色者次關東出者粗松質硬皮糙呆黃色更次其他臺灣福建湖廣出者粗大松糙為最次不入藥用惟無外國產所云南沙參為塊根亦能補肺鄭君云有辣味或別有一種耳黨參八黨參種類不一綱目拾遺引翁有良辨誤云黨參功用可代人參皮色黃而橫紋有類乎防風故名防黨江南徽州等處呼為獅頭參因蘆頭大而圓凸也古名上黨人參產于山西太行山潞安州等處為勝百草鏡有云亦有白色者總以淨軟壯實味甜者佳嫩而小枝名上黨參老而大者名防黨參味甘平補中益氣和脾胃除煩惱解渴中氣微虛用以調補甚為平安今有川黨蓋陝西毗連移種栽植皮白味淡有類桔梗無獅頭較山西者迥別入藥亦殊劣不可用近肆中一種黃色黨參有用梔子熬汁染造者服之湧吐更有一種小潞黨參皮色紅者乃礬紅所染味澀不甘皆贗物也用者宜明辨之炳章按前賢所謂人參產上黨郡即今黨參是也考上黨郡即今山西長子縣境舊屬潞安府故又稱潞黨參其所產參之形狀頭如獅子頭皮細起皺紋近頭部皮略有方紋體糯糙黃色內肉白潤味甜鮮潔為黨參中之最佳品其他產陝西者曰介黨亦皮紋細皺性糯肉色白潤味鮮甜亦為佳品如鳳黨皮紋雖略糙性亦糯軟味亦甜產四川文縣者曰文元黨皮直紋性糯味甜蘆頭小於身條皆佳又一種川黨俗稱副文元產川陝毗連處性梗硬皮粗寬紋粗肉色呆白味淡為次產禹州者曰禹潞產敘富者曰敘富黨皆粗皮直紋性硬肉燥呆白色味淡皆次產關東吉林者曰吉林黨皮寬粗而糙頭甚大如獅子頭肉白燥而心硬味淡有青草氣價甚賤為黨參中之最次其餘種類甚多未及細辨總之以皮紋細橫肉白柔潤頭小於身氣帶清香味甜鮮潔者皆佳若皮粗肉堅或松味淡氣腥如青草氣者皆為側路以此分別最為明晰如鄭君云有用梔子煎汁染造者及皮紅以礬紅所染者云云此等贗物我江浙未之見也田三七九假田三七即莪朮假造混充誤人匪淺按田漆即山漆一名三七以葉左三右七故有是名產廣西南丹諸州番峒深山中採根暴乾黃黑色團結者狀似白及長者如老幹地黃亦有如人形者有節味微甘而苦能止血散血定痛匪特為金瘡聖藥或云試法以三七摻豬血中血化為水者真用者不可不明辨也炳章按三七原產廣西鎮安府在明季鎮隸田陽所產之三七均貢田州故名田三七消行甚廣亦廣西出品之大宗也有野生種植之分其野生形狀類人形者稱人七非經百年不能成人形為最難得最道地前廣西百色商會吳寶森君購得人七一枚送滬陳列其他普通野生者皮黃黑色肉色黃白兼紅潤皆佳種植者如綠豆色亦佳黃色次之產湖廣者名水三七黃黑色皮皺有節略次產廣東者名竹節三七形似良薑有節而長色淡紅別有用處專能如無節苗者名蘿葡三七皆次頃廣東出有一種有蘆肉色白名新三七更次偽者以白芷做成實害人匪淺不可辨也丹參十丹參古出桐柏川穀今近道處有之其根赤色大者如指長尺余一苗數根氣味苦微寒無毒主治心腹邪氣寒熱積聚本草經原文歷敘功用末加益氣二字蓋益正氣所以治邪氣也近今市肆有一種土丹參服之極能散血又奚有益氣之功不知用何種草根混充殊可恨也炳章按丹參產安徽古城者皮色紅肉紫有紋質燥體松頭大無蘆為最佳產滁州全椒縣者形狀同前亦佳產鳳陽定遠白陽山漳洧者蘆細質松多細枝次產四川者頭小枝粗肉糯有白心亦次鄭君所云土丹參或即川丹參也抑或福建土產之一種別具形態余未之見也黃耆十一偽名介耆介或作蓋條硬無味色白不黃按黃耆以山西綿上出者為佳故一名綿耆色黃帶白緊實如箭竿故又名北箭耆折之柔韌如綿故能入肌腠而補氣若介耆之呆劣又安可用乎聞蓋耆性極發散有人誤服汗流不止其性與綿耆大相反用者當明辨之炳章按黃耆冬季出新山西太原府里陵地方出者名上耆是地有大有大成義聚成育生德等號貨賣雙縛成把其貨直長糯軟而無細枝細皮皺紋切斷有菊花紋兼有金井玉欄杆之紋色白黃味甜鮮潔帶有綠豆氣為最道地又大同府五臺山出粗皮細硬枝短味淡作小把為臺耆俗稱小把耆略次亳州出者性硬筋多而韌肉色黃為亳耆俗稱奎耆亦次陝西出者為西耆性更硬味極甜更次蛟城出者為蛟耆枝短皮粗無枝極次四川出者為川耆小把皮紅黑色性硬筋韌如麻味青草氣為最下品服之致腹滿最能害人凡外證瘡瘍用黃耆如陽癰托毒化膿及虛體痘瘡凹陷皆用生陰疽補托轉陽用炙皆須太原產之上耆立能見效若以側路雜耆充用則為害甚烈不可不辨矣於術十二白朮種類甚多云術肥大氣壅臺術條細力薄寧國狗頭術皮赤稍大皆栽灌而成故其氣甚濁卻少清香之味當以浙江於潛野生者名於術為第一一名天生術形小有鶴頸甚長內有硃砂點術上有須者尤佳以得土氣厚也據土人云產縣後山脈及黃塘至遼東橋一帶西流水四十里地之術方有硃砂點他處則無但野術入口味甜氣極清香總以白為佳以潤為妙近有一種江西種術其形甚小與野術相似雖有鶴頸而甚短其體堅實其味苦劣不可用貨者多以此混充於術是不可以不辨也炳章按天生野於術體輕質瘦小性糯味甘色紫皮細寬而層疊蘆軟而圓有鳳頭鶴頸之象切開有硃砂斑點氣甚香即鄭君所云於潛山黃塘至遼東橋一帶出者是也為最佳品不易多得他如近於潛山各山亦得其山脈餘氣野生者亦佳然蘆硬皮不層疊亦有鳳頭鶴頸之形其他鄰縣所出別有一種亦風頭鶴頸軟蘆如小算子而圓切開亦有硃砂點質燥味薄氣不甚者價亦廉俗名鈕釦術近時有充湖廣朮者鄭君所云江西術或即此也亦次更有冬朮移種於潛名種術顆甚大重兩大者十餘兩小者五六兩皮黃肉白無暈亦有硃砂點味甘兼辣近時市肆作於術者此也亦不甚佳其帶葉者名帶葉術偽充野術裝玻璃盒官場贈送為禮品此皆側路也又有南京茅山出者日茅朮亦有硃砂點味甘辛性糯形瘦長有細鬚根利濕藥中用之亦佳泗安產者形類毛術性燥味甘辣切片逾日起白霜亦次惟術之種類甚多就與於術有類似關係者約辨數種余概略之天門冬十三天門冬始出奉高山谷其根白色或黃色柔潤多汁稟水精之氣而上通太陽氣味甘寒無毒主治諸暴風濕偏痹強筋骨殺三蟲本經列為上品聞有用福州小番薯炊熟曬乾偽充良可慨已炳章按天門冬浙江溫州台州俱出肥大性糯色黃明亮者佳鮮時用礬水泡透剝去外皮曬之大小有提揀統之別四川山東福建河南陝西亦產總要肥壯黃亮糯潤者皆佳偽者尚少麥冬十四偽名洋麥冬色極白味苦不甜按麥冬古時野生凌冬青翠宛如麥粒故名麥冬今江浙多蒔植之根色黃白氣味甘平質性滋潤稟少陰冬水之精上與陽明胃土相合為上品服食要藥奚容偽物混充而誤人不少乎炳章按麥門冬出杭州莧橋者色白有神體軟性糯細長皮光潔心細味甜為最佳安徽寧國七寶浙江餘姚出者名花園子肥短體重心粗色白帶黃略次近時布用以此種最多四川出者色呆白短實質重性硬亦次湖南衡州來陽縣等處亦出名來陽子中勻形似川子亦不道地大者提青中者曰青提小者曰蘇大曰紹大等名目以枝頭分大小耳天花粉十五偽名次花粉聞此種系馬前頭混充其性不可知匪特不能生津止渴且服之令人頭暈目眩按花粉即瓜蔞根秋後掘者結實有粉夏日掘者有筋無粉入士最深皮黃肉白氣味苦寒能啟在下之水精上滋厥功甚偉所在皆有價亦不貴貨者偏以偽亂真藉博蠅頭之利其居心尚可問乎更有一種洋花粉無筋色白而嫩其塊較大或云系洋粉偽造煎之即腐爛皆無益之品幸勿誤服也炳章按花粉江蘇上海南翔鎮等處出為山花粉皮細結肉白性糯無筋起粉為最佳亳州出為亳花粉性糯色白無皮無筋亦佳嘉定古城江北通州等處皆出亦名山花粉皮色黃有筋略次山東關東出者為洋花粉極大質松多筋色黃白為最次鄭君云洋粉偽造即此實非偽造因其質松如粉作造非真以粉可造也黃連十六偽名廣連即洋川連色不黃中有花點皮黑面有毛按黃連以四川雅州出者為佳故名雅連形如雞距故又名雞爪連氣味苦寒色極黃易於辨識近有辦峨嵋山所產者價值甚昂漳泉人最喜購之若此種廣連色不黃則名不稱性味既殊功用自劣誤服之則貽害多矣炳章按黃連背陰草根也苗似茶叢經冬不調生於深山窮谷幽僻無日照之處必得凝寒之氣者為上八九月出新種類甚多隨地皆產且有野生種植之別惟四川野生者多佳品為治療上之要藥茲將其產別種類之形態詳別於下四川峨嵋山產者曰峨嵋連蘆軟而綠刺硬皮黃切開空心有菊花紋金黃色者為最上品撞州野出者曰撞州連蘆頭中空而圓有硬刺色黃帶青頭尾均勻切開亦有菊花紋亦佳馬湖所出者與峨嵋山連相似亦軟蘆硬刺皮色青帶黑首尾一樣有節均為佳品紫宕溝瓦屋山二山出者瘦小有蜂腰皮毛柔軟蘆硬刺亦佳以上皆為川水連亦有新老山之別如新山則條短刺硬皮黑色軟蘆多綠嫩者佳老山則細長蘆軟刺少而硬色黃老者為最佳此皆野山出品打箭爐出者亦曰水連皮黑刺少無蘆頭有杈枝色黃略次重慶種出者曰母珠連硬蘆而扁頭粗尾細色黃更次峒山種出者曰峒連蘆扁硬刺略軟色黃切開空松者亦次四川石柱廳種出者曰味連形似雞爪連亦次嘉定管高廟所出者曰嘉定連俗名母連種後五年出土皮如鱗甲肉色黃而帶紅亦次雅州產者曰雅連岡山產者曰岡連皆次南川金佛山產者曰金山連蘆長連少亦次以上皆四川產也雲南野出者曰云景連體松蘆軟形似雞腳爪無蘆刺少皮黑肉色黃亦次種者蘆硬刺軟更次廣西產者曰新山連皮光色黃質重斷則淡黃色亦甚次處州出者曰土連皮黑肉實心淡黃色者味雖苦回味兼甜亦極次奇會工出者曰會連形似母連皮略黑肉空松乃馬所食不入藥用雞屎連色黑細小斷則綠色而淡亦極次不入藥近有日本產者曰洋連形色略同皮光而有毛刺肉色淡黃微白更次亦不堪入藥自云連至洋連終俱屬側路偽品服之甚為害人醫者與病家皆宜注意之川貝母十六偽名魯貝粒扁洗後皮脫其粉即出按貝母惟川蜀出者為佳其子在根下內心外瓣其色帶白如聚貝子故名貝母蓋色白味辛生於西川故屬肺金之藥浙貝尚不可混用況魯貝乎更有一種名西珠貝母系山慈姑偽充又有一種偽貨名西貝其性不能潤肺化痰更相反也炳章按川貝四川灌縣產者底平頭尖肉白光潔而堅味微苦兼甘為最佳平藩縣產者粒團質略鬆頭微尖肉色白而無神味亦微苦兼甘亦佳敘富產者顆大而扁肉白黃色質松味淡為次魯京州大白山松盤等處產者曰魯京川黃白色頭尖亦次湖北荊州巴東縣產者皮色帶黑性硬而光頭尖肉呆白色味苦更次陝西新開山產者曰西貝或名尖貝顆扁頭尖味甚苦更不道地鄭君所云或指此種然非山慈姑偽充所云珠貝者即小象貝也蓋川貝中有獨顆不分瓣不作二瓣合抱皮無皺者名單龍精宜揀去之誤服令人筋脈不收惟用黃精小藍汁可解之川貝粉十八今人肺燥咳嗽每以川貝粉蒸梨亦清潤單方也詎料射利藥肆研便之川貝粉率以懷山藥研粉偽充雖山藥無毒其奈有外邪未罷者服之則留邪黏痰難出者服之則助痰為害匪淺如用川貝粉須當面看其研末方無此弊炳章按項元麟云川貝粉市者以象貝漂洗代之或以小山藥天花粉偽之余謂未必皆如是此屬少數市儈昧良之行為非可指普通而言如此也秦艽十九假艽出秦中今涇州鄜州岐州河陝諸郡皆有其根土黃色作羅紋交糾左右旋轉李時珍云以左紋者良今市肆偽品即邊秦有毛其枝尚小匪特左右紋難辨不知何物混充又安能療病乎炳章按秦艽陝西寧夏府出者色黃肥大蘆少左旋者佳山西五臺山亦出皮色略黑肉黃白色亦佳以上皆名西秦艽湖北產者條細質松毛屑較多名漢秦艽為次銀柴胡二十味淡蘆頭又大不知何物偽充按銀柴胡以銀州及寧夏出者為勝氣味甘微寒無毒蒿長尺余色微白力弱於北柴胡即銀州之軟柴胡專治骨蒸勞熱不但清熱兼能涼血和劑局方治上下諸血龍腦雞蘇丸中用之凡入虛勞方中最為相宜用者須購真銀柴胡為要炳章按銀柴胡陝西寧夏府甘甫州及山西大同府皆產選肥大堅實色白軟糯無沙心者為佳偽者尚無又按經疏云柴胡有二種一種色白而大者名銀柴胡逢原云銀柴胡銀州者良今延安五原城所產者長尺余肥白而軟百草鏡云出陝西寧夏鎮二月採葉名芸蒿長尺余根微白即銀柴胡藥辨云銀柴胡出寧夏形似黃耆參合諸說與近今市肆所備亦相符合據余實驗凡治虛勞肌熱骨蒸勞熱熱從髓熱及小兒五疳羸熱用之頗效若用北柴胡則升動虛陽發熱喘咳嗽愈無寧乎周一士云熱在骨髓者非銀柴胡莫瘳前人有不識藥品之形態往往妄評銀柴胡為贗物豈可不辨以淆惑後人而使無從遵循乎鱉血柴胡二十一北柴胡用鱉血制者原欲引入厥陰血分於陰虛之體最為得宜市肆中有一種偽品不知何物所制殊可恨也炳章按鱉血柴胡以鱉血拌炒柴胡慮不道地可以殺鱉現炒尚非難事然柴胡之良窳亦有多種亦宜審慎辨明如蘇浙通銷者以江南古城產者為多柴胡者在地上葉莖為柴地下根蘆為胡如古城產者葉綠甚軟而短無硬梗地下根皮紫黃色肉淡黃色形似紫草尚佳福建廈門銷行者乃盧州府無會州白陽山所出裝簍運出梗略硬或曰北柴胡略次山東本地不行兩湖通銷者為川柴胡葉綠黃色根黑黃色性糯味淡亦佳他如湖北襄陽出梗硬者為次滁州全椒鳳陽定遠俱出泥屑略多尚可用江南浦陽有春產者無蘆槍秋產者有蘆槍亦次關東出者如雞爪更不道地苦桔梗二十二苦桔梗之根結實而梗直故有是名非木上之梗也近道處處有之其根外白中黃有心味苦而辛本經主治胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣其一種無心味甜者薺苨也一名杏葉沙參又名甜桔梗性味功用與桔梗大不相同近今藥肆因苦桔梗價貴多以甜梗為充又有一種水口梗性味更劣服之安能見功耶炳章按桔梗出安慶古城山色白有蘆內起菊花心味甜帶苦者佳寧國府涇縣出者形味略同亦佳其他如鎮江全椒滁州白陽山常州宜興天長定遠樟渚各縣皆出色黃白味甜均不道地此藥乃開提肺氣為手太陰要藥須擇色白性糯飽綻味苦而有心者用之若味甜者即薺苨也效用不同不可混用耳土枸杞二十三枸杞子氣味甘寒主堅筋骨耐老除風去虛勞補精氣以陝西甘州所產者為勝近有一種粒小色淡味不甚甘皆本地所出之土枸杞非甘州上品也炳章按枸杞子陝西潼關長城邊出者肉厚糯潤紫紅色顆粒粗長味甘者為佳寧夏產者顆大色紅有蒂略次東北關外行之甘肅鎮蕃長城邊出者粒細紅圓活味亦甘此貨過黴天即變黑甚難久藏略次他如閩浙及各地產者舊地皆曰土杞子粒小味甘淡兼苦肉薄性微涼不入補益藥為最次地骨皮二十四枸杞以陝西甘州所出者為勝地骨皮即枸杞之根食療本草云氣味苦寒主去骨熱消渴近今市肆所售硬地骨不知何種草根偽充聞是風藥其性燥烈大相反若誤服之則貽害多矣炳章按地骨皮非陝枸杞根之皮乃長江土枸杞之根皮三月出新江南古城亳州蘇州江北出者皮薄性糯色黃黑氣微香片大無骨者為最佳湖北出者皮粗厚而大性硬質松色黃兼有白斑梗多為次鄭君所云硬骨皮即此是也巴戟肉二十五巴戟天甘辛微溫入腎經血分強陰益精產蜀地者佳如連珠擊破中紫而鮮潔者偽也中雖紫微有白糝粉色而理小黯者真也近有以山豆根混充者山豆色白性寒或醋煮以亂之則誤人不淺矣炳章按巴戟肉廣東出者肉厚骨細色紫心白黑色者佳江西出者骨粗肉薄略次浙江台州寧海縣出者名連珠巴戟擇其肉厚軟糯屑少去骨用肉亦佳鄭君雲山豆根混充不但效用冰炭且形態亦全不相類也白薇二十六假白薇即土白薇條大而硬色少帶黃按白薇本經名春生出陝西及舒滁潤遼諸處其根色黃微白柔軟可曲者白薇也色白微黃堅直易斷者白前也今此種土白薇或云即白前偽充形質既異功用懸殊萬不可誤用也炳章按白薇產山東者根皮赤黃色內白黃色形類牛膝實心頭下有細鬚根短而柔軟可曲乘雅云根似牛膝而細長色黃微白此即白薇與本經之說吻合陳嘉謨曰白前形似牛膝粗長堅直空心有節色黃白色折之易斷乃與近時白前形狀亦符合本草崇原集說眉批云蘇州藥肆誤以白前為白薇白薇為白前相沿已久近調查杭甬藥肆相沿亦與江蘇同近據鄭君說福建亦沿此謬習惟吾紹興幸早經考定改正吾望閩蘇甬各藥界亦當速為改正免誤病家蒙花二十七蒙花一名蒙山茶一名雲芝茶性寒能清肺胃之熱故疹病用之尤宜近今多以近道磹花偽充則性味懸殊矣炳章按蒙花三月出新湖北當歸山出者其花白綠色白茸毛淨而無梗者佳各處出花碎小色白黃梗多者次仙鶴草二十八徐友丞來稿承賜仙鶴草非龍芽草辨拜讀之下無任感佩刊登布告醫病兩家實受教益蓋中國素有天產之靈草得以發揚彼自命維新學家學習西醫皮毛唾棄中華醫藥者可恍然悟矣友丞按光緒丙申年間有畿東豐潤張雨人言刊傳仙鶴草圖說云仙鶴草三葉之下有耳葉者真無耳葉者非亦是一考據也近據會員梅子剛君來函云據友人肺癆專家陳君言此草屢治血症甚有效驗並謂不宜紅棗同食以紅棗性燥云梅君又云用以治瘰癧甚有效驗炳章按毛退之中西醫話云龍芽草多年生草山野自生高二三尺葉為羽狀複葉夏月出花軸花黃五瓣實多刺俗稱仙鶴草治吐血頗效百草鏡云龍芽草生山土立夏時展苗布地葉有微毛起莖高一二尺寒露時開花成穗色黃而細小根有白芽尖圓似龍芽頂開黃花故名金頂龍芽一名鐵胡蜂以其老根黑色形似之救荒本草云龍芽草一名瓜香草生輝縣鴨子口山野間苗高尺余莖多澀毛葉如地棠葉而寬大葉頭齊團每五葉或七葉作一莖排生葉莖腳上又有小芽葉兩兩對生梢間出穗開小圓五瓣黃花結實毛蓇突有子大如黍粒味甜植物名實圖考云此草建昌呼為老鸛嘴廣信呼為子母草湖南呼為毛腳茵以治風痰腰痛滇南本草謂之黃龍尾味苦性溫治婦人月經前後紅崩白帶面寒腹痛赤白痢疾考諸家學說並採鮮草察視再使園中種植將其生長目睹形狀辨之確是仙鶴草無疑茲將目睹形態再辨於下總莖圓根如茜草根根傍有白芽葉互生每莖七葉尖端一葉下六葉兩兩對生每對葉下有小耳葉兩對亦對生葉卵圓形端尖邊缺曲如鋸齒葉面有糙毛近根老葉枯萎則紅縭色性硬不若別種草木葉枯時皆黃也正莖直上八月間莖端成穗開五瓣黃色小花九月結子如小米證諸實驗與百草鏡救荒本草中西醫話之龍芽草亦相符合治吐血咯血皆效徐君所云仙鶴草非龍芽草辨或誤以百草鏡之紫頂龍芽或李氏草秘之石見穿因仙鶴草開黃花故曰金頂龍芽紫頂龍芽開紫花即馬鞭草也本草綱目拾遺龍芽草亦收於石打穿下石見穿云即石打穿據炳章詳細考證龍芽草當分二種金頂龍芽即仙鶴草紫頂龍芽即馬鞭草石打穿即石見穿別有一物茲將仙鶴草實驗形態繪圖於後以便考證
