body:
  text: 跋纂此書十七年藏諸篋中未敢問世客歲得讀社友曹君赤電所著規定藥品之商榷首列亂真之偽品經驗既富調查甚確一經對勘真偽立判其有功於世良足多矣蒙僻處海嶠聞見未周訪查不易所揭白偽藥百餘種僅就耳目所及而條辨之以視曹君之博雅何異小巫而見大巫然舊學以商量而遂密故不揣淺陋郵寄請益幸蒙不棄將規定亂真之偽品合參而重訂之既邀附驥之榮遑計續貂之誚耳嗟夫際此醫藥競爭時代優勝劣敗固為天演淘汰之公例若出真方服假藥是自欺自戕於人何尤無怪泰東西之藥品日新月異如潮流所趨無孔不入倘長此不進不知改良不聯團體吾恐十年後中華之生命財產悉操外人之手矣惟願天下醫林志士再就當地出產之藥品查調明確援據各家本草而辨真偽喚醒迷途扶持正軌庶幾吾國天產之藥材可放光彩於世界拭目以俟能不馨香禱祝以求之也夫中華民國六年荔夏天貺節飲井山人肖岩甫謹跋時年六十有九
