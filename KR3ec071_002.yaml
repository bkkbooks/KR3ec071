body:
  text: 卷二芳草部藿香一偽名次藿香氣味不香不知何處所産更有一種洋藿香性味更別葉梗皆然用之無益而有害按藿香産於嶺南交趾為正地道故近日由廣東辦來者為良氣味芬香功能醒脾和胃宣氣開鬱最得天地之正氣且方莖有節中虛葉似桑而小薄用者當明辨之炳章按藿香本草名兜婁婆香産嶺南為最道地在羊城百里內之河南寶岡村及肇慶者五六月出新方梗白毫緑葉揉之清香氣繞鼻而濃厚味辛淡者名廣藿香廣東省垣各山貨行收買揀淨髮行首推巨昌與泰昌為最道地如雷州瓊州等處産者名海南藿香即今所謂洋藿香也其氣薄而濁味辛辣燥烈葉細而小梗帶圓形莖長根重為最次其他如江浙所産之土藿香能趁鮮切片烈日曬乾貯於缸甏使香氣收貯不走入藥效能亦甚強不亞於廣藿香也土薄荷二土薄荷色淡無香味不若蘇州所蒔者佳莖小氣芳方堪入藥故陳士良食性本草謂之吳菝𦽅菝𦽅音拔活可見薄荷以吳産者為上品炳章按薄荷六七月出新蘇州學宮內出者其葉小而茂梗細短頭有螺螄蒂形似龍頭故名龍腦薄荷氣清香味涼沁為最道地太倉常州産者葉略大梗亦細一莖直上無龍頭形氣味亦略淡有頭二刀之分頭刀力全葉粗梗長香氣濃厚二刀乃頭刀割去後留原根抽莖再長故莖梗亦細葉亦小氣味亦略薄尚佳杭州莧橋産者梗紅而粗長氣濁臭味辣甚次山東産者梗粗葉少不香更次二種皆為側路不宜入藥荊芥三荊芥本經名假蘇味辛性溫臭香處處有之本系野生今多栽種近有一種偽品並無香味又安能治寒熱破結聚下瘀血而除濕疽乎炳章按荊芥三月出新江南孟阿陸宛産者莖細短穗多色緑為最佳太倉出者穗多氣香亦佳蕭山龕山出者梗粗葉緑穗少氣香略次江西山東産者梗粗穗紅不香南京出性硬皆極次其他各處皆出總要梗紅穗多葉緑氣香者為道地蘇梗四蘇梗即紫蘇旁枝小梗崇原云氣味辛平無毒主寬中行氣消飲食化痰涎治噎膈反胃止心腹痛通十二經關竅脈絡近市肆有一種白蘇梗即白蘇之梗既去白葉無從辨識葉色既殊梗性自別不堪入藥用者慎之炳章按紫蘇江浙皆出紫梗空心葉雙面皆紫有皺摺紋如雞冠者故名雞冠紫蘇味辛氣甚香為最佳又一種緑方梗葉上面緑下面紫惟葉筋紫氣微香而濁俗為野紫蘇最次不入藥乃蘇梗多屬野蘇之梗蓋雞冠蘇梗在五月間連葉帶梗嫩時割收以作蘇葉其梗未老已收只可作嫩蘇梗之用惟野蘇其葉不採藥用任其留存至九月間收子以作蘇子拔根以作蘇梗其實皆野蘇梗也為不道地前胡五真前胡以吳興産者為勝根似柴胡而柔軟味亦香美為疏風清熱化痰妙藥聞有一種土前胡其根硬其心無紋決不可服炳章按前胡十月出新浙江湖州寧國廣德皆出顆大光白無毛性軟糯氣香觸鼻者佳若梗硬心白即土獨活之類與前胡同類異種耳為不道地細辛六偽名洋細辛形雖似而無味按細辛氣味辛溫遼冀産者名北細辛可以入藥南方産者名杜衡其莖稍粗辛味稍減一莖有五七葉俗名馬蹄香不堪入藥北産者其莖極細其味極辛若此種粗而無味先失命名之義又奚有治病之功乎炳章按細辛六月出新關東出者為北細辛根莖細清白氣辛葉少梗多為最佳江南寧國涇縣出亦佳江寧句容滁州白陽山等處出皆次亳州出者為馬細辛山東出為東細辛均次不堪藥用黃菊七附滁菊白菊黃菊即黃色之茶菊較家菊朵小心多而色紫杭州錢塘所屬各鄉多種菊為業九十月取花挑入城市以售有高腳黃等名色味苦微甘性平而香去風除熱明目疏肝能清眩暈頭風其浙省城頭一帶所産名城頭菊皆野生城上石縫中至秋開花花小如茶菊香氣沁脾點茶更佳聞有以本地園中所種之陶愛一名滿天星偽充形雖似而性不同且少香味又安能療病乎炳章按菊花種類甚雜惟黃菊産杭州海寧等處味苦兼甜香氣甚雅有蒸曬二種蒸菊將鮮菊入蒸籠內先蒸癟再曬烘焙至燥其色老黃收藏朵瓣不散曬菊此鮮花烈日曬乾其色嫩黃朵松花瓣易散皆道地城頭菊野生城牆陰處色黃朵較少浙名野菊花亦蒸曬為善味苦性涼香氣亦佳以散風清火解毒消瘡腫凡生危險疔毒用野菊搗汁一大碗飲之可免毒氣攻心以燥花作枕永免頭風瘡癤其他如滁菊白菊真贋關係較黃菊猶重為此再附辨之附滁菊白菊炳章按白滁菊出安徽滁州者其採法先剪枝連花帶葉倒挂簷下陰乾後再摘花故氣味更足其花瓣細軟千層花蕊小嫩黃色花蒂緑尖小而平氣芬芳味先微苦後微甘口含後香氣甚久不散為最佳出浙江德清縣者花瓣闊而糙蕊心微黃蒂大柄臍凹陷氣味香不濃為略次又按白菊河南出者為亳菊蒂緑千瓣細軟無心蕊氣清香味苦微甘為最佳蘇州滸墅關出為杜菊色白味甘又出單瓣亦佳海寧出者名白荼菊色白瓣粗心蕊黃味甜多茶葉店買亦佳江西南昌府出名淮菊朵小色白帶紅味苦氣濁梗多亦次廈門出者曰洋菊朵大而扁心亦大氣濁味甘更次金銀花八金銀花甘平除熱解毒能和榮衛療風養血除痢寬脹匪特為瘡科要藥也隨地皆有以河南所産為良近有以黍花偽充為禍最烈黍花短小梗多色黑不香為異亦易辨已炳章按金銀花産河南淮慶者為淮密色黃白軟糯而淨朵粗長有細毛者為最佳禹州産者曰禹密花朵較小無細毛易於變色亦佳濟南出者為濟銀色深黃朵碎者次亳州出者朵小性梗更次湖北廣東出者色黃黑梗多屑重氣味俱濁不堪入藥土玫瑰九玫瑰花色紫氣香味甘性微溫入脾肝二經和血調氣平肝開鬱惟蘇州所産者色香俱足服之方能見效近有以本地所生之土玫瑰及月季花陰乾混售不可不知炳章按玫瑰花産杭州莧橋者花瓣紫紅花蒂青緑色氣芳香甚濃者佳産湖州者色紫淡黃紅色朵長蒂緑黃色且有小點香味淡略次蕭山龕山産者桃紅色味淡氣香而濁受潮極易變色為最次且玫瑰花具有特性人尿屎澆者立死凡正月終抽紅芽剪新抽嫩條每棵二三枝種斜形生根較易次年其花盛開根傍亦有嫩枝發出隔二三年宜遷種換地此花名離娘草必須移東植西方得起發若同園有開紅花之果木如石榴薔薇等類則滿園玫瑰忌不開花速將奪色之花遷遠則玫瑰及時而開亦其特性也縮砂十偽名洋扣味辣不香色亦帶黃更有一種廣扣仁大味苦均非真品按縮砂仁産嶺南山澤間近以陽春出者為佳故一名春砂狀似豆蔻皮緊厚而皺色黃赤外有細刺氣味甚香胡得攙用洋扣廣扣魚目混珠殊可恨也炳章按縮砂即陽春砂産廣東肇慶府陽春縣者名陽春砂三角長圓形兩頭微尖外皮刺靈紅紫色肉紫黑色嚼之辛香微辣為最道地羅定産者頭平而圓刺短皮紫褐色氣味較薄略次廣西出者名西砂顆圓皮薄刺更淺色赭黑色香味皆淡薄更次鄭君所説味辣不香或是西砂必非洋扣西砂圓形惟殼與蔻不同似難混充耳土蜜砂十一縮砂仁在山採下用蜜生浸所以殺其燥烈之氣也聞有以原殼砂水浸透以蜜煮過其性仍燥用者慎之炳章按近時之縮砂仁外粉白色內肉紫色嚼之味辣氣味香皆廣西産即西砂內仁也其性質確燥亦次不若帶殼春砂之為道地也小茴香十二偽名洋小茴顆粒甚小毫無香味按茴香一名蘹香有大小之別小茴性平大茴性熱以寧夏産者第一功能理氣開胃調中止嘔匪特為治疝聖藥若此種不香之小茴既失茴香命名之義又安能治病乎炳章按小茴陝西寧夏出者其氣香粒粗短黃緑色者道地去灰屑及梗用山東出粒細色緑者次川芎十三偽名洋川芎形雖似而味薄則功用自劣按芎藭以四川産者為勝故名川芎氣味辛溫根葉皆香若此種洋川芎味薄不辛安能治病更有一種南芎只可煎湯沐浴皆不堪入藥矣炳章按本草一名芎藭蜀省産地首推灌縣有野生家種之分其莖高二尺葉如芹分裂尤細秋間開白花五瓣為傘形花序全體芬馥其根即芎藭也産地聚集成都重慶者多形大圓為撫芎藍由縣出者嫩小曰藍芎陝西出扁小為西芎皆次浙江溫州及金華出曰南芎更次川芎各處雖出因地命名除蜀産者外皆不道地近年蜀省産額頗廣足敷全國所需求所以除川芎外他如藍芎西芎南芎等現出産較少已在淘汰之列近年日本雖亦有産其形似是而非氣味尤惡劣不堪入藥國人亦無購之者鬱金十四鬱金辛苦微甘氣寒其性輕揚上行入心及包絡兼入肺經涼心熱散肝鬱破血下氣出川廣體鋭圓如蟬肚皮黃肉赤色鮮微香折之光明脆徹苦中帶甘者乃真今市中所售者多是薑黃並有以蓬莪朮偽之者俱峻削性烈挾虛者大忌用者慎之況鬱金苦寒色赤入心薑黃辛溫色黃入脾莪朮味苦色青入肝胡得混售而貽害耶炳章按鬱金山草之根野生也兩廣江西咸有之而以蜀産者為勝上古不甚重用以治馬病故又名馬術因其形像莪朮也自唐以後始入藥料治血證有功本非貴重之品清初吳亂未靖時蜀道不通貨少居奇致價數倍甚則以薑黃輩偽之者然其形鋭圓如蟬腹狀根杪有細須一縷如菱臍之苗長一二寸市人因呼金線吊蝦蟆蟬肚爵金是也其皮黃白有皺紋而心內黃赤銼開儼然兩層如井欄産四川重慶惟本年生者嫩小而黃若遺地未採逾年而收則老而深黯色如三七狀為老廣鬱金然老鬱金治血證化瘀削積之力勝於嫩者若開鬱散痛即嫩黃者亦效乃近年傳黑者為野鬱金黃者為假並誤其為薑黃殊不知此物本是野生若薑黃皮有節紋肉色深黃無暈蓬朮色黑無心最易辨也然老鬱金雖産四川近今名稱廣鬱金所謂川鬱金乃溫州産也色黯黑形扁亦有心惟不香耳子薑黃十五子薑黃氣味辛苦而溫是經種三年以上老薑所生色黃入脾兼治氣匪特破血除風聞有以黃北薑偽充則貽害多矣炳章按子薑黃福建邵武出者色黃皮黃黑色有節皺紋者佳四川産者名川黃略次江南北地産者色深黃作顏料用之廣西柳州産者形似蟬肚色深黃兼黑者次作香料用之片薑黃十六李時珍云以扁如乾薑形者為片子薑黃治風痹臂痛有奇功今肆中有偽品即薑黃假充粒大皮粗味辣內不結潤非片子也勿用為是炳章按片薑黃與子薑黃大小塊色皆不同片薑黃比子薑黃大六七倍切厚片色淡黃兼黑邊有鬚根廣東潮州浙江溫州俱出丹皮十七偽名洋丹皮肉紅皮黑條大何種草根偽充本不可知按牡丹始出蜀地山谷及漢中今江南江北皆有而以洛陽為盛入藥惟取野生花開紅白單瓣者之根皮用之氣味辛寒而香皮色外紅紫內粉白乃心主血脈之要藥奚容以贋品誤混用者當買蘇丹皮為美炳章按丹皮産蘇州閶門外張家山閘口者皮紅肉白體糯性粉無須無潮久不變色為最佳第一貨産鳳凰山者枝長而條嫩外用紅泥漿過極易變色亦佳産寧國府南陵縣木豬山者名搖丹皮色黑帶紅肉色白起粉者亦道地滁州同陵及鳳陽府定遠出亦名搖丹有紅土黑土之分紅土者用紅泥漿上待後其土色紅汁侵入內肉白色變紅黑土乃本色帶紫久遠不變亦佳産太平府者內肉起砂星明亮性梗硬為次以上就産地分物質高下其發售再以支條分粗細大小以定售價之貴賤選頂粗大者散裝本箱曰丹王略細小者曰二王再下者作把曰小把丹最細碎作大把者曰大把丹其産地好歹與粗細以別道地與否然皆本國出品非外國貨也隰草部附水草谷菽熟地一地黃以懷慶所産為良一經蒸曬其色便黑為熟地黃以九蒸九曬透心黑者為佳中心微黃者次之聞用紅白蘿蔔以地黃汁浸透曬乾假充尤宜細辨炳章按地黃六七月出新淮慶出者短圓如卵細皮性糯者道地直地乃出新時壓扁捏長以枝頭大小分價目上下天津出者體長皮粗性梗為次細者名細生地或曰直皮熟者以生者洗去泥沙蒸曬九次者佳云以紅蘿葡做就偽充者此屬理想之談於形色氣味不符豈可混充又有鮮生地一種杭州莧橋出者長莖根皮光黃白色肉白微黃肥長性糯者佳河南出者枝亦長黃褐色肉白有硬筋略次此物以治血熱證鮮用易爛藏者掘一淨土窖下用干沙泥襯底面上貯生地一層再夾沙一層如是收藏則少爛耳牛膝二偽名洋牛膝與懷牛膝色不同而性自異按牛膝今時用根味甘臭酸其性微寒惟懷慶及川中出者為真根皆長大柔潤近道雖有謂之土牛膝別有治法古方尚不用之況此種洋牛膝乎炳章按牛膝計有三種功用各有專能河南淮慶産者曰淮牛膝根長二三尺肉肥色黃白皮光潔性糯枝粗者佳天津産者皮黃粗糙有軟刺不圓性梗者次四川産者曰川牛膝根莖粗無蘆色黃黑枝粗軟糯者良去頭稍用浙江各地出者曰杜牛膝紫梗緑葉對節而生葉頗類莧根細短含有滑汁治喉症能引吐惡痰毒痰利小便淮牛膝補筋健骨滋肝腎之功如牛之有力也故名川牛膝祛風利下焦濕種類不同效用亦異紫菀三偽名次紫菀又名硬蘆紫菀服之往往愈見咳逆氣結其害無窮按紫菀近道處處雖有出産然色紫味苦質極柔宛若此種硬蘆形質既殊性味自劣聞又有以車前及旋覆根赤土染過混充者更奚堪入藥乎炳章按紫菀鳳陽府亳州龍王廟四鄉出者鬚根粗軟糯色紫紅硬梗少者佳河南淮慶府出枝略細軟糯亦可用湖北出者性硬根細泥屑重者次偽者浙江尚少因價賤出貨亦多故耳款冬四款冬花為治嗽要藥十一二月開花如黃菊雪積冰堅之時款花偏豔想見其純陽之品故一名款凍生河北關中微見花未舒放者良近今市肆多以枇杷花蕊偽充雖無大害然性不同則功自異耳炳章按冬花九月出新山西太原出者色紫紅無梗為手瓣冬花最佳有梗者曰上冬花次之梗多色黑紫者曰中冬花亦次亳州出者更次考冬花花瓣色紅紫光潔枇杷花色黃紫有茸毛形態不同最易鑑別紅花五偽名洋紅花形雖似而色不清不知何物偽充按紅花即紅藍花生梁漢及西域今處處有之人家場圃多種花如大薊色甚清紅氣味辛溫功能活血潤燥止痛散腫通經化瘀易備之藥亦至難信有真方無真藥良可慨已炳章按紅花三四月出新河南歸德州出者名散紅花尚佳亳州出者亦名散紅花略次浙江寧波出者名杜紅花亦佳皆紅黃色山東出者名大散花次之孟河出者更次河南淮慶出者名淮紅花略次湖南産者亦佳陝西産者名西紅花較次日本出者色淡黃味薄名洋紅花又有片紅花色鮮紅別是一種紅花鮮搗壓成薄片曬乾大紅染坊作染真紅用者多河川出者名結子花其色紅紫者佳宴州出者為大結子花此亦大紅染坊店所用結子花偽者以蘇木研末用麵糊搗透做成粒子甚次不如用杜紅花之為妥又有西藏紅花一種花絲長色黃兼微紅性潮潤氣微香入口沁入心肺效力甚強為紅花中之極品沙苑子六沙苑藜蒺俗名北沙苑苦溫補腎強陰益精明目産陝西潼關者真狀如腎子微帶緑色今市中所賣有用紅花草子偽充貽害匪淺炳章按沙蒺藜七月出新陝西潼關外出者名潼蒺藜色紅帶黑形如腰子飽綻性糯味厚氣香滾水泡之有芳香氣者為最佳亳州出者曰亳蒺藜細而且瘦性梗泡之無芳香者次山東出者名東蒺藜色黃粒扁粗大性更硬最次揚州出者為荷花郎郎之子遍地皆有土名草蒺藜即南方紅花草子之子不入藥用車前子七車前草本經名當道詩云芣苡好生道旁及牛馬足迹中故有車前當道及牛遺馬舄之名江湖淮甸處處有之主治氣癃治濕痹市中有大小車之別大車為真品小車系土荊芥子偽充萬不可用蓋車前甘寒荊芥辛溫性既相反又奚容混售乎炳章按車前子江西吉安蘆江出者為大車前粒粗色黑江南出者曰土車前俱佳淮南出者粗而多殼衢州出者小而殼淨皆次河北孟河出者為小車前即荊芥子也不入藥用宜注意之薤白八薤白氣味辛溫無毒根如小蒜色白者辛而不苦近有以鬼蒜偽充掰開無瓣噫薤白為處處皆有之藥值亦甚賤胡昧良者偏以偽亂真乎炳章按薤白各處皆産生土墳上即俗謂素蔥之根葉如細韭菜色緑空心根如小蒜頭若採時去須莖蒸熟曬乾則質堅緊不致脫皮且曬之易燥若生曬則質松層層脫皮且不易乾燥故近今皆用蒸曬者多惟偽者少見石蓮子九蓮子至秋黑而沉水為石蓮子用者去黑殼以水浸去赤膜青心方可入藥氣味甘平略澀無毒止虛瀉療久痢健脾開胃又能固精氣今市肆有一種苦石蓮狀似土石味極苦澀不知何物偽充或云即樹上所生苦珠子之類盧子由云食之令人腸結宜於建蓮子揀帶殼而色黑者為是雖未能沉水遠勝多矣炳章按石蓮以霜降後蓮房枯散而蓮子落於泥中取用外殼硬色黑內肉仍與干蓮子同味甜心苦與蓮子無異市有廣東産者一種木蓮其色亦黑兩頭略團殼光有細橫圈紋性寒味苦為不道地如無真者不如代用蓮子為妥蒲黃十蒲水草也蒲黃乃香蒲花中之蕊屑細若金粉始出河東澤中今處處有之以秦州出者為良近今藥肆中或以松花偽充按松花氣味辛溫蒲黃氣味甘平松花能除風蒲黃能消痰性既不同功亦各異胡得偽充以害人乎況失笑散中有用蒲黃為治産後瘀血攻心之妙方若用松花偽充則貽誤不少矣炳章按蒲黃乃蒲草之花蕊色淡黃是花茸花蕊相合名草蒲黃為佳又有一種蘇州來者曰蒲黃面色老黃屑細滑若粉入罐煎之如糊膠一般服之令人作嘔且不能入喉吾紹初到時人人以此為道地各大藥鋪爭先置備後因病人不能可服向醫生責問始識受蒲黃面之害乃通告各藥鋪禁其沿用今仍用草蒲黃鄭君所云屑細若金粉或亦是此物不識以何物偽作亦非松花粉蓋松花粉色淡黃質輕蒲黃面質重色老黃然總是害人贋品應當革除之洋扁豆十一洋扁豆顆粒較大皮瘦色微赤不堪入藥當以蘇州所産色白者為勝氣味甘微溫和中下氣止泄痢清暑氣暖脾胃除濕熱止消渴方有功效炳章按扁豆浙江杭州湖州紹興出者開白花其實要白而有光體飽滿者佳江南安慶江西俱出惟亳州出者顆大扁形名洋扁豆為不道地赤豆十二赤豆出江淮間今關西河北汴洛皆有入藥以緊小赤黯者為良氣味甘酸平無毒主下水腫排癰腫膿血今藥肆中有一種赤黑相間者聞是相思子每以偽充赤小豆其謬已甚夫既名為豆豈可於五穀外求之耶炳章按赤豆浙江慈溪餘姚蕭山龕山近沙地皆産之粒小細長如腰子紫紅色腰間有白紋如鳳眼名杜赤豆入藥能利小便泄血分之濕熱為最道地又一種色紅赤粒大團形比黃豆略小名紅飯豆各處皆出僅供食品不入藥用又一種名海紅豆出海南其子大而扁今人亦誤作赤小豆誠大謬矣半紅半黑者名相思子俗呼赤小豆屬木本植物與梅冰性相合能令香不耗散故近今梅冰中多拌有此物服食須知云相思子出嶺南樹高丈餘白色其葉似槐其花似皂莢其莢似扁豆其子似赤小豆惟半截紅半截黑為異今廣東擔子上以線綴成串或作首飾以貨之其性味苦平有小毒能吐人及治貓鬼夜道病俗又呼為雲南豆子又能治蠱毒除一切蟲搜神記云大夫韓憑妻美宋康王奪之憑自殺妻投之臺下死王怒令冢相望宿昔有文梓木生二冢之端根交於下枝錯其上康王哀之因號相思子此説段公路北戶録亦載之
