body:
  text: 卷三毒草部土大黃一大黃本經謂之黃良後人謂之將軍以其有伐邪去亂之功也古人以出河西隴西者為勝今以莊浪所産者為佳故一名莊大黃莊浪縣即古涇原隴西地至川中所出有錦紋者亦可用味苦氣寒色黃臭香紫地有錦紋方堪入藥若此種土大黃中微淡不黃只可用為香料蓋其性不能通利若誤服之且能燥腸護穢當細辨之炳章按大黃九十月出新陝西甘肅涼州衛出者堅硬緊結色黃頭起錦紋似冰旋斑為最佳故俗名錦紋大黃河南西寧州出者形狀與前相類似質略鬆或曰中大黃四川出者空松為馬蹄大黃最次山西亦出名味黃久而變黑更次皆不堪藥用鄭君所云土大黃或即此類也附子二附子以蜀地綿州出者為良氣味辛熱有大毒主治風寒咳逆邪氣寒熱踒躄拘攣膝痛不能行步破癥堅積聚血瘕金瘡今陝西亦蒔植附子謂之西附性雖辛溫而力稍薄不如生於川中者土厚而力雄也聞肆中有一種洋附混售性味既劣力量更遜一經炮製既難辨識不免害人更有一種臭附尤不可用慎之慎之炳章按附子八九月出新四川成都彰明産者為川附底平有角皮如鐵內肉色白重兩許者氣全最佳性潮鮮時用鹽漬醃蓋不醃易爛然經鹽漬過性味已失效力大減景嶽先生已辨之詳矣陝西出者為西附黑色干小者次天雄三天雄氣味亦是辛熱有大毒本經主治稍異而旨則同凡附子種在土中不生側子經年獨長大者為天雄仍是蜀地綿州所産者為勝近今每有以厚附偽充施之重證必不能奏效矣炳章按天雄與附子同物亦産四川彰明者良凡長大端正不生側枝獨長本身每個在三兩上下者即名天雄非別有一物也厚附片乃四川鮮附子制而切片不經咸漬洗漂效力且比本漂淡附片勝數倍凡用淡附片二錢厚附片只能用一錢因其力猛也麻黃四麻黃始出晉地今滎陽汴州彭城諸處皆有之氣味苦溫無毒春生苗纖徑直外黃內赤中空有節如竹形宛似毛孔故為發表出汗聖藥市肆有以席草偽充氣味既別力量毫無重症用之不免貽誤炳章按麻黃九十月出新山西大同府代州邊城出者肥大外青黃而內赤色為道地太原陵丘縣及五臺山出者次之陝西出者較細四川滑州出者黃嫩皆略次山東河南出者亦次惟關東出者細硬蘆多不入藥若席草偽充更為害人矣北乾薑五俗省作薑土北薑溫州所産質松不結味淡不辛又有一種洋北薑氣味尤劣更不可用按北乾薑氣味辛溫其色黃白兼見仍手足太陰之溫藥也凡制乾薑炮薑當以三衢開化産者為佳用母薑水浸曬乾以肉厚而白淨結實明亮如天麻者良故又名白薑近今藥肆且有以傷水變味之生薑曬乾炮用未免有名無實誤人匪淺炳章按乾薑湖南均州出小雙頭內白色為均薑最佳浙江台州出者為臺薑個小肉黃黑色者次其他江南江西寧國四川皆出總要個大堅實內肉色白為佳高良薑六陶隱居言高良薑始出高良郡故得此名別録云氣味辛大溫無毒主治暴冷胃中冷逆霍亂腹痛近有偽品色黑而暗不黃根瘦無味非高良所産不可用用之反有害矣炳章按高良薑廣東海南出者皮紅有橫節紋肉紅黃色味辛辣為道地出貨多用途少偽者鮮見南越筆記云高良薑出於高涼故名根為高良薑子即紅豆蔻子未圻含胎鹽糟經冬味辛香入饌又云凡物盛多謂之寇是子如紅豆而叢生故名紅豆蔻今驗此花深紅如灼與圖經花紅紫色相吻合花罷結實大如白果有稜嫩時色紅緑子細如橘瓤所謂含胎也老則色紅即草木狀之生薑楚辭之杜若也川椒七川椒本經名蜀椒列於中品産於巴蜀顆如小豆而圓皮紫赤色皮厚而里白味極辛烈而香凡閉口者去之近有土椒色黑無味又安能溫中散寒乎炳章按花椒山野自出干高五六尺至丈餘梗生小刺葉為對生羽狀復葉春日開小花黃緑色初夏結實圓小始色青緑熱則變赤裂開香氣甚烈即本草所謂之椒紅也産地首推中州名曰南椒顆粒大外紫里白氣味濃厚椒多目少最佳江浙間釀酒家皆需此産於蜀者名川椒産於秦嶺者名秦椒顆粒略小尚佳産于山東即墨縣者名東椒又名女姑椒色紅黑氣味較薄為次江淮間産者名土椒色青黑粒小味淡更次吳茱萸八偽名洋吳萸味較辛辣顆粒又小服之反有頭痛貽害匪淺按吳茱萸江浙蜀漢皆有多生吳地故名吳萸味辛溫有小毒木高丈餘葉紫色似椿而闊厚開紅紫花結實纍纍成簇似椒子而無核嫩時微黃熟則深紫形色可辨幸勿用洋吳萸而貽害不少也炳章按吳茱萸上春出新湖南長沙安化及廣西出者粒大梗亦多氣味觸鼻皆佳浙江嚴州出者粒細梗少氣味略薄亦佳洋吳萸氣味皆淡不入藥用惟近年絶少到半夏九偽名洋半夏形雖似而粒不圓不知何物偽充誤服有害按半夏氣味辛平有毒青齊江浙隨處有之生於澤中者名羊眼半夏總以圓白為勝陳久者良若此種洋半夏殆亦由跋混充歟由跋即天南星之小者絶類半夏幸勿誤用炳章按半夏三四月出新杭州富陽出者蒂平粒圓色白質堅實惟顆粒不大為最佳衢州嚴州出者略扁蒂凹陷色白微黃亦佳江南出者粒小江北出者如帽頂形皆次四川荊州出者粒圓而大色白質松有筋落水即胖大易腐亦次饒州涇縣揚州泰興出者皆松碎不道地不能切片漂作半夏粉用尚可福建出者浸入水中即腐爛更次不入藥用鄭君云南星之小者絶類半夏但南星無論大小皆極扁不若半夏之圓以此分辨不能可偽也蘇戈夏十蘇製半夏當以宋公祠所製為勝因半夏性燥有毒故用法制之性較和平去痰之功雖緩然素體屬火者頗見相宜近今偽藥雜出因蘇夏盛行上海各處均有仿製製法不同功力自遜而肆中所售土蘇夏者系用半夏研末調麵粉米泔疊為圓粒假充上海蘇夏以偽亂偽殊堪痛恨炳章按蘇州戈製半夏不但各地仿製作偽且現洋托民信局去購亦多贋品因該地信局與偽半夏店訂有私約與信局以重大回扣而寄來仿單亦屬相同惟半夏色黯不香無玉桂氣戈老二房真者其色黃亮氣香有玉桂氣欲購真者必須托郵局匯洋挂號寄蘇州閶門臨賴路戈老二房半夏店則不致誤購偽品耳且戈半夏方雖祕製大約與本草綱目拾遺內宋公夏相類有肉桂性溫燥炳章實驗治寒濕痰上壅氣喘確效凡治陰虛熱痰氣喘苟誤服之必因燥熱而咳血自汗愈速其死矣尤當注意之商陸十一偽名次商陸即俗所稱豬卜卜者其性無從稽考萬不可服按商陸氣味辛平有毒主治水腫癰腫殺鬼精物近道所在有之春生苗高二三尺莖青赤極柔脆葉如牛舌而長夏秋開花作朵根如蘿蔔似人形者有神有赤白二種白根者花白赤根者花赤白者入藥赤者毒更甚俗名章柳不可服服之見鬼神嗟嗟同是一種根色赤者尚不可用豬卜卜之異種乎炳章按商陸八九月出新各處皆出吾江浙市上通用白商陸赤者不入藥服之有消爍筋腎之毒故勿餌鄭君所云豬卜卜不知其形狀若何因未曾見過不敢妄評常山十二假者色極淡真者色帶黃按常山又名恆山産益州及漢中今汴西淮浙湖南諸州郡皆有生山谷間常山者根之名也狀似荊根細實而黃者謂之雞骨常山用之最勝今市肆所買假常山不知何物偽充良可慨已炳章按常山十月出新湖南常陽山出者色黃無蘆形如雞骨者良俗稱雞骨常山為最佳如外黃內白粗大者皆偽是別種樹根偽充不可不辨也瀉葉十三瀉葉産自外洋性味和平不傷中氣為西藥通便妙品聞市肆有以別種樹葉混售匪特不靈抑且有害用者須向屈臣氏藥房購取方不誤事炳章按瀉葉諸家本草皆未搜採考西藥略釋水瀉門有新拿俗名洋瀉葉産印度埃及等處高約二三尺亦間有至七尺者採葉用形尖味苦不適口功用能瀉大便宜配別藥同服或泡服或作散末服西藥大成名辛拿類別有八種之多其云印度替納勿里所産其樹長葉鋭尖形質薄色黃緑者亦稱道地有一種葉尖圓而厚則屬贋品其他辨論甚詳不及備載日本藥物學撮要名旃那葉又名辛那葉又名瀉葉其普通狀態葉體扁平而不反曲質堅強而薄帶黃緑色葉柄甚短邊緣平坦頂端尖鋭枝脈為弧狀四分出分甲乙兩種甲種為披針形長二五仙米至五仙米幅達於二仙米乙種較甲為小為尖卵圓形長一仙米至二仙米幅達二仙米本品為瀉利之實驗近今多為瀉下藥用之木部附果木香木寓木肉桂一真肉桂出桂陽山谷及廣州交趾者最佳必肉厚氣香色紫黯有油味甘嘗之舌上極清甜者方可用若嘗之舌上不清及切開有白點者是洋桂大害人洋桂尚不可用近日有偽造肉桂者聞用楊梅樹皮其形似桂曬乾以薄桂熬取濃汁浸潤透心再曬再浸以香油潤過致色香即無以辨屢以此等假桂遠販外府縣及窮鄉僻壤各小肆混售害人無算安得有心人為之嚴行禁絶乎炳章按肉桂為樟科樟屬植物常緑喬木種類甚多産越南廣西熱帶當分數種曰清化曰猛羅曰安邊産鎮安關外曰窯桂産窯川曰欽靈曰潯桂此總名也又有猛山桂即大油桂曰大石山曰黃摩山曰社山曰桂平即玉桂産雲南曰蒙自桂産廣東曰羅定桂曰信宜桂曰六安桂最盛産外國者為錫蘭加西耶皆名洋桂大抵桂之鑑別一辨皮色二辨氣味辨皮之法皆以形狀比喻相似名之曰荔枝皮曰龍眼皮曰桐油皮曰龍鱗皮曰鐵皮曰五彩皮曰硃砂皮曰皺紗皮皮以二色惟野生無定形總不外結實滑潤淨潔六字為要桂性直上身如桄榔直豎數丈中無枝節皮紋直實肉如織錦紋細而明者為上桂然野生者間有橫紋其形狀必蒼老堅結橫直交錯斑點叢生皮色光潤紋細而滑亦為野生佳品若橫紋多而色紅皮粗紋粗如荊棘滯手皆為下品此辨皮色之大要也辨氣觀其土産皮色既知其外又須嗅其氣嘗其味以知其內辨氣亦有六法如醇厚馨燥辣木蝨臭是也凡試桂聞氣以手摸桂肉數轉聞之即知如清化桂則氣醇而馨猛羅桂則氣厚而馨安邊桂則氣馨而不燥潯桂或燥或辣或氣如木蝨臭者亦有氣醇而微帶木蝨臭者若收藏年久燥辣之氣消惟木蝨臭卒不能革除或有馨香得人工所制亦帶木蝨氣皆屬偽種要以馨而純如花之清香不雜若似花椒丁香氣而燥如山奈皂角氣而辣皆下品也辨味嗅氣之外當試以味試味之法以百沸湯沖水少許涼而嘗之當分醇厚燥辣為四味且湯汁入口分辨較鼻嗅更易明必須味醇厚不燥辣者為最佳不辣之中先以水辨其味曰清曰濁曰淡茶色曰米汁曰乳汁曰緑汁曰白水凡白水淡茶色清者味必醇惟米汁乳汁緑水皆有清濁之分清者味醇濁者味燥然紅水間有清濁難分必嘗其味厚而醇者為野生猛羅之類味燥者為欽靈潯桂之類緑水亦不一類如猛羅種油黑者水必緑味多苦亦有油薄者水亦不緑如潯桂之油濃者則水亦緑其味必兼燥清化安邊其得氣清其油必薄神桂之油雖亦厚薄不一惟五味俱全有甜辣苦酸亦有甜馨而馨總以微帶苦酸為正總之不得以油之厚薄為定見水緑紅為貴賤須要別其水之清濁味之醇燥辛辣斯可為分辨的確耳再辨口刀一清化桂荔枝皮硃砂肉刀口整齊皮肉不起泡點不見花紋皮縮肉不凸實而不浮皮肉分明或皮肉之界有線分之曰銀線最為清品二猛羅桂龍眼皮或五彩皮或硃砂皮皺紗皮固有肉縮肉凸肉不起泡點不現花紋正而不浮亦為正品三欽靈桂潯桂即窯桂二種皆粗皮橫紋刀口邊口起泡凸皮縮肉凸紅色泡點花斑皆燥烈此為下品四神桂桐油皮龍鱗鐵甲皺紗肉氣厚而馨味厚而醇為野生神桂之正品玉板桂今之蒙自桂也片平而厚邊卷而淺肉色黯黃皮粗而厚油脂不多亦稱上品他如皮色青黃層卷如筒亦名筒桂即今安桂是也又有官桂一種桂枝即其枝也出羅定形如安桂味淡性薄卷作二三層者皆次此辨桂之種類優劣參考前哲名言徵以實驗約略從形態氣味言之惟效用不及再詳據鄭君所辨之種皆非上品如下品已賤何必再作偽品此我浙尚無之杜仲二偽名洋杜仲又名土杜仲皮紅而厚少絲按杜仲之木始出豫州山谷得中土之精皮色黑而味辛平折之有白絲相連不斷兼稟陽明少陰金水之精氣故本經主治腰膝痛補中益精氣堅筋骨強志除陰下癢濕小便餘瀝若此種洋杜仲皮色既紅則性味自別又安可用乎炳章按杜仲乃樹之膜皮也其樹之葉作倒矗之卵形端尖但能剝杜仲之樹幹非高數丈大可一二人抱者不可考其年齡在數十年者割剖之時間自五月至九月過此則不易分剖矣其皮在根間者厚松而次在中段者皮厚細糯為佳枝杈以上皮雖細極薄效力亦弱矣産四川綏定洛陽者體質堅重外皮細結內皮光黑中層絲厚扯之韌長如絲者最佳巴河産者亦佳貴州及鄂之施南湘之寶慶等處産者皮粗質輕皆次浙之溫臺與閩省質松皮粗內層絲皮其薄皆不道地黃柏三柏古字作蘖今省筆作柏黃柏本出漢中山谷今以蜀中産者皮厚色深黃為佳樹高數丈葉似紫椿經冬不調皮外白里深黃色入藥用其根結塊如松下茯苓氣味苦寒無毒近有一種偽品色黃而黑味竟不苦不知何物假充用之得無害乎炳章按黃柏四川順慶府南充縣出者為川柏色老黃內外皮黃黑塊片小者佳可作染料用湖南及關東出者為關柏塊片甚大而薄色淡黃者次東洋出者為洋柏色亦淡黃質松更不入藥枳殼四偽名洋枳殼不知何種果實偽充或云六七月採小香欒偽為枳實枳殼或云採枸橘混充又福州多橘土人於夏秋間橘子未大經風雨搖落者拾而曬之偽充枳殼性既不同誤用有害按周禮云橘逾淮而北為枳今江南枳橘皆有江北有枳無橘江西多枳不僅逾淮而始變也七八月採者為枳實九十月採者為枳殼氣味苦酸微寒臭香形圓花自多刺穰內黃白皮色深緑故又名緑衣枳殼主散留結胸膈痰滯逐水消脹滿能瀉上焦氣分實邪為治病要藥若以偽品混售真草菅人命矣炳章按枳殼枳實為老嫩大小之分別江西沙河出者細皮肉厚而結色白氣清香而佳龍虎山出者亦佳四川出者名川枳殼色黃肉厚味帶酸次之江浙衢州出者皮粗色黃卷口心大肉薄亦次浙江黃埠出者肉鬆而大有燈盞之名更次洋枳殼者或即此也七八月採者小而嫩肉厚干之黑褐色為枳實九十月採者殼大肉略薄色白為枳殼每個對切為兩皆以翻肚如盆口唇狀須陳久者良近時有一種臭橘形亦相似其氣惡濁不堪入藥化橘紅五按嶺南雜記化州仙橘相傳仙人羅辦種橘於石龍之腹惟此一株在蘇澤堂為最故梁氏家藏蘇澤堂化州橘皮著有橘紅歌歌長不録産清風樓者次之紅樹者又次之其實非橘皮厚內酸不可食其皮釐為五片或七片不可成雙每片真者可值一金前朝每年所産循例具文報明上臺屆期督撫差親隨跟同採摘批制官斯土者亦不多得彼土人云凡近化州得聞譙樓更鼓者其皮亦佳故化皮贋者多真者難得關涵嶺南隨筆有云化州署橘樹一月生一子以其皮入藥痰立解後為大風所折即其地補種氣味更殊今稱化州橘紅者率以增城各處所出香柚皮偽代之氣味辛溫而烈氣虛及有火者萬不可服服之即有害昔豐順丁中丞撫閩時贈化州橘皮一個計五片皮薄色黯黃微有毛孔氣香味甘且語先君云此豫官化州學時署中檻前一株每年只産數枚朝夕調護寶而藏之且云近化州得聞署中更鼓者尚可用舍此皆贋物也今肆中辦有一種皮厚色緑者皆柚皮偽充醫者處方幸勿輕率頻疏緑毛化及化州皮等名徒服偽藥於病鮮濟不如只用陳久橘皮較為穩當願與同志商之炳章按梁紹壬云化州橘樹乃仙人羅辦種於石龍腹上共九株各相去數武以近龍井略偏一株為最井在暑大堂左廊下龍口相近者次之城以外則臭味迥殊矣廣西孝廉江樹玉著橘紅辨謂橘小皮薄柚大皮厚橘熟由青轉黃柚熟透緑轉黃間常坐臥樹下細驗枝葉香味明明柚也而混呼之曰橘且飾其皮曰紅實好奇之過云或有云近龍井下有礞石礞石能化痰橘樹得礞石之氣故化痰力更勝識藥辨微云化橘紅近日廣中來者皆單片成束作象眼塊或三十五十片兩頭以紅繩扎成一把外皮緑黃色內腹皮白色周身有豬鬃皮此種皆柚皮亦能消痰此近今名白毛紅又一種為世所重每扎十片如爪用化州印名五爪橘紅亦柚皮所制較掌片略佳究之較真者遠甚也真化州橘紅煎之作甜香取其汁一點入痰盂內痰變為水此為上品如梁氏家藏蘇澤堂橘紅每一個七破反折作七歧曬乾氣甚香烈此亦上品也近今通行有黃色緑色兩種均七歧對摺質薄有毛黃色較緑色尤貴雖非真品皆屬柚皮之類然用於寒痰濕痰病尚效凡屬陰火熱痰及肝火爍肺涎痰皆忌誤用之反增劇甚則咳血不可不知也橘絡六橘絡即橘瓤上筋膜日華子謂口渴吐酒煎湯飲之甚效張隱菴云能行胸中之飲而行於皮膚故又能疏達絡氣貨缺之時聞價值甚昂射利之徒用白萊蔔細切如絲曬乾以橘皮煎濃汁浸潤再曬偽充橘絡色香幾無以辨巧則巧矣如斫喪天良何炳章按金御乘雲橘絡能宣通經絡滯氣豫屢用以治沖氣逆於肺之脈脹甚有效趙恕軒云通經絡氣滯脈脹驅皮裡膜外積痰活血此其效用之實驗也其産地亦有多種如出廣東者名廣橘絡色白條細蒂少出浙江衢州名衢橘絡色白絡細長皆佳出四川者色白黃絡粗略次出臺州者名臺橘絡絡細少帶蒂為最次內製陳皮七蘇州宋公祠創制陳皮醬為理嗽化痰妙藥馳名天下近上海多有偽品尤而效之即福州亦有偽製假充味辛辣雖甜不潤其色粗淡不堪入藥誤服之反見咳嗽勿用為是炳章按百草鏡制青鹽陳皮即蘇州宋公祠之遺法也能消痰降氣生津開鬱運脾調胃解毒安神方用陳皮二斤河水浸一日竹刀輕刮去渣白貯竹筐內沸湯淋三四次用冷水洗淨不苦為度曬之半乾可得淨皮一斤初次用甘草烏梅肉各四兩煎濃汁拌日曬夜露俟酥捻碎如豆大再用川貝母去心四兩青鹽三兩研為細末拌勻再曬露候乾取貯或名參貝陳皮亦同此法木瓜八偽名洋木瓜大粒長式光皮黑色不知何種果實偽充萬不可用按木瓜處處雖有當以宣城産者為勝陳久者良氣味酸溫皮薄色黃赤味極芳香能調榮衛助穀氣平下利腹痛去濕和胃及濕痹腳氣霍亂轉筋等證聞又有木桃木李形質頗相似亦可偽充用者當求真品也炳章按木瓜為落葉灌木之植物干高五六尺葉長橢圓形至春先葉後花其花分紅白兩種頗美豔秋季結實長圓形産地首推浙江淳安縣名淳木瓜最佳外皮皺紗紋色紫紅體堅結肉厚心小個勻湖北宣城産者名宣木瓜體結色紫紋皺亦佳其餘紫秋巴東濟南等處所産雖亦有佳種然不及以上兩處之美四川綦江縣産者名川木瓜質松色黃皮粗糙無細紋個大而肉薄亦次福建産者色黃而大味香不入藥用又一種紅梨皮光肉結實者亦偽充木瓜不堪入藥如鄭君所云木桃木李或即此類宜慎辨之烏梅九造烏梅法系取青梅籃盛於灶突上燻黑若以稻灰淋汁潤濕蒸過則肥澤不蠹近有以小李偽造充售則無益而有害矣炳章按烏梅杭州出者肉厚核小色黑性潮潤者佳紹興楓橋出者性燥核大肉薄色黑微黃者略次別處亦出總要肉厚色黑性糯為佳沉水香十真黑沉香以海南黎洞所出者為勝最不易得次則真臘次則交廣崖州等處入藥須取色純黑質不枯硬重能沉於水者為上半沉者次之近有以老束香有紫油者偽充性燥烈質重不能沉水誤人匪淺炳章按南方草木狀云交趾有密香樹干如匱柳其花白而繁其葉如橘欲取香伐之經年其根干枝節各有別色也木心與節堅黑沉水者為沉香與水面平者為雞骨香其根為黃熟香其餘為棧香細枝堅實未瀾者為青桂香其根節輕而大者為馬蹄香其花不香成實乃香為雞舌香同出一樹皆珍異之物也香譜云沉水香出天竺單于二國與棧香雞骨同出一樹其葉似橘經冬不調夏生花白而圓細秋結實如檳榔色紫似椹而味辛樹皮青色木如櫸柳重實黑色沉水者即沉香今復有色黃而沉水者謂之蠟沉丁香傳云香之類有四曰沉曰箋曰生結曰黃熟其為類也有二沉香得其八焉曰烏文格曰黃蠟曰牛眼曰牛角曰牛蹄曰雞頭曰雞腿曰雞骨皆為沉香也雞骨香以其枯燥清浮故名青桂香即沉香黑斑者也倦遊雜録云沉香木嶺南諸郡悉有之瀕海州尤多交干連枝岡嶺相接數千里不絶葉如冬青大者合數人抱木性虛柔山民或以構茅屋或以為橋梁為飯甑尤善有香者百無一二蓋木得水方結香多在折枝枯乾中或為沉或為煎或為黃熟自枯死者謂之水槃香今南恩高竇等州惟産生結香蓋山民入山見香木之曲干斜枝必以刀斫之成坎經年得雨水所漬遂結香復以鋸取之刮去白木其香結為斑點亦名鷓鴣斑燔之甚佳沉香之良者惟在瓊崖等州俗謂角沉乃生木中取者宜用熏裛黃熟乃枯木中得之宜入藥用其依木皮而結者謂之青桂香氣尤清在土中藏久不待刓剔而精者謂之龍鱗亦有削之自卷咀之柔韌者謂之黃蠟沉香尤難得此即伽楠香也鐵圍山叢談云香木初一種也膏脈貫溢則其結沉實此為沉水香也其類有四謂之氣結自然其間凝實者也謂之脫落因木朽而自解者也謂之生結先以刀斧傷之而後膏脈凝聚其間也謂之蠱漏因傷蠹而後膏脈亦聚也四者以自然脫落為上而其氣和生結蠱漏則其氣烈為下焉其外則有半結半不結為弄水沉因其半結則實而色黑半不結則不實而色褐有謂之鷓鴣斑是也復有名水盤頭其結實厚者亦近乎沉水香但香水被伐其根盤必有膏脈湧溢故亦結但數為雨淫其氣頗腥烈雖有香氣不大凝實謂之箋香三者其産占城國不若真臘國真臘不若海南黎洞又皆不若萬安吉陽兩軍之間黎母山至是為冠絶天下之香無能及之矣范成大曰沉水香上品出海南黎洞亦名土沉香少大塊其次如繭粟角如附子如芝菌如茅竹葉者皆佳至輕薄如紙者入水亦沉香之節因久墊土中滋液下向結而為香採時而香悉在下其背帶木性者乃出土上環島四郡果皆有之悉冠諸蕃所出尤以出萬安者為最勝蓋萬安山在島之正東鍾朝陽之氣香尤醞藉豐美大抵海南香氣皆清淑焚一博許氛翳滿室四面悉香至煤盡氣亦不焦此南海香之辨也占城真臘等香近年又貴丁流眉來者豫試之乃不及海南中下品舶香往往腥烈意味又短帶木性尾煙必焦海北生交趾者蕃舶皆聚欽州謂之欽香質重實多大塊氣尤酷烈難可入藥南人賤之蓬萊香者亦出海南即沉水香結未成者多成片如小竺及大菌之狀有徑一二尺者極堅實色狀如沉香惟入水則浮刳其背帶木處亦多沉鷓鴣斑香亦得之於海南沉水蓬萊及絶好箋香中搓牙輕鬆色褐黑而有白斑點點如鷓鴣臆上毛氣又清婉如蓮花箋香出海南香如蝟皮栗蓬及漁蓑狀蓋修治時雕鏤費工去木留香棘刺森然香之精鍾於刺端芳氣與他處箋香迥別黎岐紀聞云沉水香俗人以為海南寶牛角沉為最上細花次之粗花又次之其有成片者渾沌形類帽者為帽頭沉蟲蝕而有蟲空者為蟲口沉象形取義各不同也又有一種曰飛香如牛筋飛大練飛苦瓜飛麻雀飛等其形各殊命名亦異然飛香內亦有牛角沉細花粗花之分未可概論大概各香以沉水不沉水分貴賤耳然香之出也有神黎中人往往于山內偶遇香用草縛其樹以作記急取斧斤砍之及再至其處則草移別樹而原香亦不可復得耳綜觀諸賢辨香之産地結香之原因香類之鑑別已闡發無遺毋庸炳章再辨矣茲據前賢所名牛角沉即今之墨沉最上品是也所謂鷓鴣斑蓬萊香帽頭沉蟲口沉即今之將軍帽魚片沉之類是也今之所謂毛沉者實為前賢所謂香外削去之木也為最次不入藥用不可不知也降真香十一降真香以舶上來者為番降色紫而潤最為真品近市肆竟以蘇木煨半透偽充蘇木雖似降真但降真氣味辛溫能止血蘇木氣味甘平能破血性既相反功又懸殊用者宜細辨之炳章按朱輔山云真降本出南海山中今溪洞僻處所出者似是而非徑瘦不甚香真臘記云降香生叢林中番人頗費砍斫之功乃樹心也其外白皮厚八九寸或五六寸焚之氣徑而遠稽含草木狀云紫藤長莖細葉梗極堅實重重有皮花白子黑其截置煙焰中經久成紫香可降神故名降香按紀氏所説與前説稍異豈即朱氏所謂似是而非者乎抑中國出乎與番降不同乎鄭君所云或南降乎惟蘇木混充恐非事實蓋降香色紫黑堅緻氣香有辛辣氣蘇木色黃微紅質脆松氣微香如柏樹氣形色氣味皆有不同且降香出貨亦多價值低廉恐不易混充耳乳香十二乳香一名薰陸香苦溫辛香善竄入心活血舒筋生肌止痛能通行十二經西出天竺南出波斯等國圓大如乳頭明透者良為瘍科要藥今市肆多以楓脂松脂混充誤人不少炳章按乳香出暹羅等處為薰陸樹之脂以透明黃亮形如乳頭者為滴乳香最佳去油以水煎煬去底腳皮滓投入冷水內乳香則凝結成顆粒如黃豆沉於水底油得如脂則浮於水面去之以此製法為最道地炒之則油仍不淨且增火氣又一種名包乳色黃如粉屑砂石攙和甚多價雖較廉然貨次不堪藥用耳梅冰片十三附假黃三仙熟老片偽名樟片即樟腦用西法提出偽充按冰片唐本草名龍腦香以白瑩如冰及作梅花片者為上品氣味辛苦微寒無毒故喉症目疾痔瘡外科多用之且功能通諸竅散鬱火若樟腦之性辛溫判若天淵更有一種熟老片系將洋樟片攙用以偽亂真害人匪淺近日黃三仙且有陶黃研末攙入者此又不可不知矣炳章按梅冰一名龍腦産大泥者色白光亮片薄最佳文萊出者色亦白光略呆略次呷喇叭出色呆片厚有木屑攙雜次麻城丁家路呂宋龍門泊等處出皆次廣西百色縣蒸熬大楓葉以煉液結晶成粉為製冰片之原料曰艾片亦偽作冰片惟治疥瘡能殺蟲闢臭穢亦佳只可作外治藥用凡合丸散內服藥及眼藥內切不可充用有毒用之害人匪淺又一種樟冰用樟腦同薄荷升煉亦只能用於殺蟲瘡藥重要丸散亦不可用此皆偽貨也化學易知云龍腦亦樹液也樹上鑽空其汁流出而自結取而蒸之即得但其性與樟腦不同更能飛散香氣顆粒皆不同此為長方形樟冰為八面形龍腦原質比樟冰多輕氣二分大抵真者別頭梅二梅三梅以片之粗細分貴賤耳惟四梅片細質不純為最次不宜合藥用再冰片忌與酒同服若與酒同服錢許即正氣散亂血脈沸騰必致七竅流血須臾而死凡中其毒者宜即飲新涼水毒自解琥珀十四琥珀出西番南番及松樹楓木津液墜地多年所化色黃而明瑩者名臘珀色若松香紅而且黃者名明珀有香者名香珀出高麗日本者色深紅凡中有蜂蟻松枝形色如生者尤好當以手心摩熱拾芥為真氣味甘平無毒能安五臟定魂魄消瘀血通五淋近有以松脂偽造混售松脂氣味苦溫性不同則功自別炳章按南蠻記云寧州有折腰峰岸崩則蜂出土人燒治以為琥珀常見琥珀中有物如蜂形此説亦難憑信列仙傳云松柏脂入地千年成為茯苓茯苓化為琥珀今泰山出茯苓而無琥珀益州永昌出琥珀而無茯苓亦無實據或言龍血入地為琥珀或言虎死時目光淪入地生琥珀故又名虎魄此屬無稽神話更無價值可言元中記言松脂入地為琥珀廣志云哀牢縣生有琥珀生地中其土及旁不草深者八九尺大者如斛削去外皮中成琥珀初如桃膠凝結成也滇志云雲南麗江出者其産地旁不生草木深八九尺大者如斗削去外皮中成琥珀紅大明透者為血珀最佳黃嫩者力薄為金珀次之今蠻地莫對江猛拱地産此夷民皆鑿山而得與開礦無異滇南雜志云琥珀産緬爨諸西夷地以火珀及杏紅血珀為上金珀次之蠟珀最下供藥餌而已又云珀根有黑有白有如雀腦據諸家所説最屬礦物質無疑化學易知云琥珀為地內變化之松香內含數種松香之質史廷揚説琥珀云琥珀為松柏等脂液埋置土內日久遂成化石雖云礦物仍胚胎於植物者也其成分純屬有機化合平均百分中含炭素七八九四水素一五三酸素一五三又往往有小蟲肢體混合其內是必當時蟲類飛行適觸流動狀之脂液中陷入不復得脫南蠻記所説或此類歟遂並而為一焉色黃而赤又有呈褐色者豔紅與黑殆所罕見則體為不規則狀多小顆德國柏林博物館所藏重量達十八磅洵世界最大之産物也性脆為半透明體重量極低與水相若倘置於一另五一另九之海水中則浮而不沉硬度二乃至二五較石膏猶過之以銅片擦之則易損傷以布摩之生強電氣能引紙片毛髮等但傳熱極鈍加熱至攝氏百五十度而始柔軟二百度至三百度而始溶解若投於火最易燃燒放黃焰與香氣其殘餘之灰燼適如海綿狀之炭物質亦一奇觀也其生産地在北德之波羅的海濱就中摩麥旦澤間産額最多其狀態可分為二其一屬第三紀之下部漸新統與褐炭層俱現為母床其二過海波之衝擊及風雨冰雪之作用離母床雜海沙而漂積其産於海濱者稱海琥珀質純而均歷久不變色比之山産實遠過之一千八百六十年頃撒謨蘭島發見琥珀母床後其坑道近傍常有天然露出者與前紀之海濱産同為北德之特色此係德國産之琥珀科學之研究也更據中國産之琥珀以藥用者之鑑別以深紅明透質鬆脆者為血珀最佳廣西産者色紅明亮為西珀亦佳黃嫩者次之金珀更次廈門産者色淡黃有松香氣為洋珀更次他如雲貴邊省人死以松香櫬填材底伏土深久松香由黃轉黑土人名曰老村香以充琥珀年久古墓中往往發見之然色黑無神光仍含松香氣為最次不入藥用欲辨真偽試將琥珀摩擦之能發電氣拾芥者真偽者不發電氣放樟腦臭置酒精中最易浸入以刀削之成粉凡安心神定魂魄宜生用與燈芯同研去燈芯眼科宜入豆腐內煮用茯苓十五茯苓當取整個切片照之微有筋膜者真切之其片自卷以結白為上近來有一種鏡片多以米粉和苓末假造混充聞又有以米粉包裹松根造成整個者亦宜細辨炳章按宗奭曰茯苓生於多年大松之根乃松之精氣盛而抑鬱發泄於外結為茯苓故不抱根離其本體有零之義也精氣不盛止能附結本根既不離本故曰獲神淮南子云千年之松下有茯苓上有菟絲宗奭曰上有菟絲之説甚為可信時珍曰下有茯苓上有靈氣如絲之狀土人亦時見之非菟絲也典術云松脂入地千年為茯苓望松樹赤者下有茯苓此皆言天然野生之茯苓其生長在十年或數百年不等得松之精氣足其皮黑皺其肉堅緻結合不論何地産皆為佳品惟雲南産天然生者為多亦皮薄起皺紋肉帶玉色體糯質重為最佳借乎出貨不多其他産臨安六安於潛者種苓為多其法用本地天産鮮茯苓搗碎如泥種於肥土山葉茂松根上先將松根傍離根二尺余掘去泥土至見松根將茯苓屑每株約一兩以竹箬裹附松之支根上閲半年施肥料一次至三年起掘則成二三斤重量之茯苓然其生結不在原種根上隨氣息止而結苓往往有種於西杈根而結苓在東杈根間有種而不結者且松根下結苓而葉必萎黃或發紅色此即松之精氣收聚凝結為苓也故土人望而即知其謂有苓種苓外皮鬆浮而厚內肉鬆而不堅結色白無神即種苓也為次凡茯苓有筋者去之雷斆云茯苓有赤筋者誤服令人目中有星多服致目盲服茯苓者注意之茯神十六茯神真者木心或在旁或在中亦不止一心切開有筋膜者是也假者木心在中且止一心而無筋膜炳章按茯神即茯苓之抱木中心者茯苓乃得松之氣自作塊而大不附著根其抱根而生者茯神也其餘鑑別法詳前茯苓條下血竭十七血竭一名麒麟竭甘咸平色赤專入血分散瘀生新止痛生肌善收瘡口南越志云麒麟竭是紫礦之脂也出南番欲驗真偽但嚼之不爛如蠟者為上磨之色透指甲者方真今有以海姆血偽充者味大咸有腥氣不堪入藥須明辨之毋為所誤炳章按蘇恭曰麒麟竭樹名渴留紫礦樹名渴稟二物大同小異馬志曰二物同條功效亦別紫礦色赤而黑其葉大如盤礦從葉上出炳章按紫礦俗名紫草茸乃此樹上蟲所造成故綱目列入蟲部麒麟竭色黃而赤從木中出如松脂頌曰今南番諸國及廣州皆出木高數文婆娑可愛葉似櫻桃而有三角其樹脂從木中流下滴下似膠飴狀久而堅凝乃成竭色作赤色採無時舊説與紫礦相類而別是一物功力亦殊一統志云血竭樹略似沒藥樹其肌赤色採法亦於樹下掘坎斧伐其樹脂流於坎旬日取之多出火食國考諸家辨正血竭確別有一物惟南越志言是紫礦之脂或亦傳訛之辭總之血竭色要鮮紅有光質體要松試之以透指甲者為真以火燒之有赤汁湧出入紙無迹暈久而灰不變本色者為麒麟竭最佳色紫黑質堅外竹箬包裹者為鞭竭略次偽者以松香火漆做成入火滴紙有迹暈宜辨之阿魏十八阿魏辛平入脾胃消肉積殺細蟲去臭氣出西番木脂熬成氣味極臭試取少許安銅器一宿沾處白如銀汞者真今人多以胡蒜白偽造之用者不可不慎炳章按新疆雜記云阿魏傘形科之多年生草本也高三四尺莖徑寸許葉淡紅色五六月間花叢生於頂如茴香氣非常之臭偶一沾之數日不能去其液名阿魏精人取之販賣每斤價錢八錢根莖如蘿蔔徑三四寸長尺余人取之以熬膏每斤價錢三四錢此即真阿魏也五雜俎云黃金無假阿魏無真皆狀其得之之難而不知新疆塔城伊犁鎮西以及迪化之孚遠奇台等處遍野漫山直有用之不竭之勢牽羊毒羊之説尤為謬妄矣且産於伊犁者其味特香尤為奇品觚賸云諾皋載波斯國出阿虞長八九尺皮色青黃三月生葉似鼠耳斷其枝汁如飴久而堅凝名阿魏本草亦從之近有客自滇中來言彼處蜂形甚巨結窩多在絶壁垂如雨蓋滇人於其下掘一坎置肥羊於內令善射者飛騎發矢落其窩急以物覆坎則蜂與羊相刺撲二者合併取出杵用是名阿魏所聞特異此説謬妄不能取信附録以待考正據諸家本草亦多從植物類而生並無此議考近今市用色黃溏者曰溏魏佳黑者名砂魏次按阿魏有三試法以半錢阿魏安於銅器中一宿有魏沾處如銀者真以一錢入五豆草自然汁中一宿至明日如鮮血者亦佳一錢安柚樹上立乾者亦佳天竹黃十九天竹黃生南海鏞竹中此竹極大又名天竹故宗奭云是竹內所生如黃土著竹成片者今剖諸竹內往往得之按李時珍有言竹黃乃大竹之精氣結成其氣味功用與竹瀝同而無寒滑之害氣味甘寒涼心經去風熱清痰火真者難得故肆中有偽品或云即土石所造色雜不可辨用者不可不慎也炳章按李時珍本草綱目釋名條下採注吳僧贊寧筍譜云天竺生南海鏞竹中又名天竹此竹極大其內生黃可以療疾本草作天竺之竺非矣李息齋竹譜詳録云鏞竹出廣南絶大內空節可容二升交廣人持以此量出納竹中有水甚清潔溪澗四月後水皆有毒惟此竹水無毒土人陸行皆飲用之至深冬則凝結竹內如玉即天竹黃也可療風癇疾又如相迷竹生黃州狀與鏞竹大同小異中亦有黃堪作丸治病然力不及鏞竹云沈存中筆談補云嶺南深山中有大竹即鏞竹內有水甚清徹溪澗中水皆有毒惟此水無毒土人陸行多飲之至深冬則凝結如玉即天竹黃也昔王彥祖知雷州時盛夏至官山溪澗水皆不可飲惟剖竹取水烹飪飲啜皆用竹水次年被召赴關東行求竹水不可復得問土人乃知至冬則凝結不復成水適是夜野火燒林木為煆燼惟竹黃不灰如火燒獸骨色灰而輕土人多以火後採集以供藥品不若生得者為善因生時與竹節貼牢不易取鑿耳沈李二公所説竹黃確是近今天生之老式竹黃又考日本竹譜云竹實酥竹膏皆漢之天竹黃也因竹枯筒中之露水由濕熱凝結如麵粉者名天竹黃田中方男云此物系生於竹節間凝結物大抵由純粹玻石而成於東印度中國以供藥劑之用價甚貴用於膽液性之嘔吐痰癇血痢痔疾及其他相類之證林氏本草云竹條中之黃乃竹所含有之乳汁液干而凝結者性與新竹之甘味液相同至於老竹則色液俱變結為堅塊恰如一種浮石有異味而收斂異常儼如已燒之象牙印度名之曰竹糖漢醫名曰竹黃植物字彙云若竹幹過于堅密則其節中以得太陽之溫度而次第凝結之故自然滴液如蜜即古來所傳竹實酥也法大字書云竹節間有名他伯希尹爾者為玻石質而雜以灰石質少許及有機性之物質是昔所最珍奇者也由是觀之則老竹節間所瀦留之甘液次第凝結為砂石狀者也其性為玻石質玻石質者木賊麥稗等之堅質所具之質也本邦九州竹中有液者甚多特薩州竹中出有砂石狀之物迄七八月割之則出水十月十一月則成砂塊灰黃色綜觀東西洋諸學説其名雖有竹實酥竹膏等之異辨其生成形態與沈李之發明亦相吻合然亦足資參考以補我中華舊有本草之所未詳比較現行老式片天竹黃一一符合余如大明云此是南海邊竹內塵砂結成者宗奭曰此竹內所生如黃土著竹成片者馬志曰天竹黃生天竺國今諸竹內往往得之多燒諸骨灰及蛤粉等雜之者云云大抵如近人云人造者依據此説也近時作偽者不獨以蛤粉等製造甚至有用水門汀偽造者可謂天良傷盡者也然偽造形態易於鑑別與天然生成者形色不同耳
