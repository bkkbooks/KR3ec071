body:
  text: 卷四石部硃砂一丹砂始出涪州山谷今辰州錦州及雲南波斯蠻獠洞中石穴內皆有而以辰州為勝故又名辰砂大者如芙蓉花小者如箭鏃研之明淨鮮紅斯為上品近今市肆有以鉛丹攙入硃砂又用代赭攙入辰砂貽害多矣炳章按硃砂體質極重鮮紅硃紅色至褐紅色之粒塊亦有成細小透明之斜方之結晶體者或為紅色粉末有時含有機物則顏色殆黑不明亮俗為陰沙實內含有銻質或鐵質銅及各種硫化物礦相伴不堪入藥周去非云據本草金石部以湖南辰州所産為佳雖今世亦貴之今辰砂乃出沅州其色與廣西宜州所産相類色鮮紅微紫與雍州砂之深紫微黑者大異功效亦相懸絶蓋宜山即辰山之陽故也雖然宜辰硃砂雖良要非仙藥嘗聞雍州石江溪峒歸德州大秀墟有金纏砂大如箭鏃而上有金線縷文乃真仙藥得其道者可用以變化形質試取以煉水銀乃見其異乃雍州燒水銀當硃砂十二三斤可燒成十斤其良者十斤真得十斤惟金纏砂八斤可得十斤不知此砂一經人力形質乃重何哉是砂也取毫末而齒之色如鮮血誠非辰宜可及惜乎出産不豐不能分銷全國耳今所通行者皆湖南辰州及雲南貴州出者苟能片大而薄如鏡面光亮色紫紅鮮豔明透者為鏡面砂亦佳如整粒者為豆砂能起鏡面光豔亦佳細如粉屑者為米砂略次如呆色紫暗不明亮者即陰砂內含銻質或鐵質為更次不宜入藥用硇砂二時珍曰硇砂性毒服之使人硇亂故名恭曰硇砂出西戎形似牙消光淨者良蘇頌曰西戎來者顆塊光明大者有如拳重三四兩小者如指而入藥近有一種如秋石味鹹又一種如豬肝色有星點不知是何石所混充皆為贋品不用為善炳章按石雅云硇砂者何即緑化阿麻尼亞是也或作䃩方書一名狄鹽日華子本草一名北庭砂蕭炳四聲又名氣砂圖經本草或作硇砂硇砂古以出北庭為顯故名北庭砂北庭即西域火州在漢為東師前王地隋為高昌唐置西州宋時回鶻居之元時始名火州明史云其地多山青紅若火故名火州方輿紀要云火焰山在柳陳城東連互火州是火州殆以火焰山得名也高昌國傳云北庭山中出硇砂山中常有煙氣湧起無雲霧至日光焰若炬火照見禽鼠皆赤採者著木底靴取之皮底者即焦下有穴生青泥出穴外即變為砂石土人取以治皮蘇頌圖經云今西涼夏國及河東陝邊州郡亦有之西戎來者顆粒光明大者如拳重三四兩小者如指邊界出者雜砂如麻豆粒彼土人為之氣砂方輿紀要謂蘭州南四十五里有硇砂洞出硇砂又太原府河曲縣西五里有火山上有硇砂窟下有氣砂窟若然則硇砂亦出內地邊界矣然而碎如麻豆又雜砂石則疑與西土來者精粗或異矣於今所見形塊粗末色帶黃赤味辛鹹多孔遇火白煙如雲起古曰氣砂洵可謂名符其實矣新疆礦産調查記云硇砂産于闐之魯村達爾烏蘭布孫山及拜城硇砂山者為紅硇砂産於庫車者為白硇砂新疆雜記云硇砂産于闐硇付達爾烏蘭布孫山及拜城之硇砂山庫車之大鵲山徐星伯云其山極熱望之若列燈取硇砂者春夏不敢近惟嚴冬時取之入山採取亦必去其衣肌著以衣包僅露二目至洞內鑿之不過二時皮包已焦取出砂石每千斤得純砂石少許著石上紅色星星攜此必用瓦壇盛之但壇不可太滿滿則受火氣熏蒸致於破裂硇砂善揮發受風受濕皆可揮發淨盡故壇藏必須密閉賈人在此時行數日遇天氣晴明無風時則稍揭其封口以出火氣又云運庫車時曾攜數十壇行抵伊犁則石皆化為黃粉而純砂不見矣若白色成塊者不易化可以及遠內地所謂硇砂即此是也以上所辨為上品之淡硇內地不能可得近今所通行者皆咸硇石硇為不道地亦有高下不同如色如硃砂或淡紅起鏡面西土産者佳如豬肝色者名豬肝硇或曰洋硇者次之山西出者為石硇亦次陝西出者為香確紅色者亦佳湖廣出者為咸硇又名江砂其色要白者佳食鹽色者次風化硝三風化硝乃芒硝用蘿蔔煎煉去鹹味置之風日中吹去水氣則輕白如粉故名風化硝市肆中有以玄明粉僞充者殊不知玄明粉是用朴硝芒硝以甘草煎過置泥罐中用火升煅製法既別功用懸殊誤人不淺炳章按風化硝乃皮硝所提煉而成皮硝又名朴硝産於江北通州山東生於斥鹵之地經冬令西北燥風冷氣凝結成硝掃取即名皮硝再以皮硝入水煎煬去雜屑經宿凝結狀如鹽末名曰朴硝再以水煎澄去渣滓入蘿蔔數枚同煮熟傾入盆中經宿則凝結成白硝如冰其表部生有細芒如鋒者為芒硝其生牙似圭角作六角稜縱橫玲瓏名馬牙硝又以其似白石英故又謂之英硝其再以蘿蔔汁煎煉至去鹹味為甜硝置風日中吹去水氣則輕白如粉即風化硝是也若同甘草汁煎過鼎罐升燒則為元明粉也赤石脂四赤石脂始出南山之陽及延州潞州吳郡山谷中今四方皆有乃石中之脂故揭石取之以色如桃花理膩黏舌綴唇者為上為少陰腎臟之藥又色赤像心甘平屬土近有僞品即黃土混充色粗不能黏舌勿用為要炳章按時珍曰膏之凝者曰脂此石性黏能固濟爐鼎蓋兼體用而名也石脂有五色之分赤石脂原出濟南今蘇州餘杭亦出性不甚佳石雅云石脂即堊土堊白土也方書名其石脂者具五色今以赤白二種驗之亦高嶺之類其赤者殆即所謂紅高嶺也吳地餘杭山有白堊色如玉甚光潤號曰石脂則白石脂即白堊愈無疑矣赤石脂色淡紅如桃花色細膩滑潤者佳近有新式石脂色赤質粗不細滑不知何種土質其次無疑不可入藥蟲介部珍珠一僞名藥珠每用上海假珠或廣東料珠僞充若研為粉更難辨識按珠類不一入藥當以蚌珠為貴不用首飾及見尸氣者宜揀新完未經鑽綴之珠以人乳浸三日煮過方可搗研一法以絹袋盛入豆腐內煮一炷香不傷珠質研細如粉方堪服食不細則傷人臟腑古方外證多用湯藥罕用近人湯劑喜用蘇珞珠又豈料為假珠所欺誑乎用者慎之炳章按范成大蟲魚志云珍珠出合浦海中有珠池蛋戶投水採蚌取之相傳海底有處所如城郭大蚌居其中有怪物守之不可近蚌之細碎蔓延於外者始得而採之嶺表録異云珠池在廉州邊海中有洲島島上有大池謂之珠池每年刺史親監珠戶入池採珠以充貢賦皆採老蚌取而剖珠池在海上其底與海通其水乃淡深不可測也土人採小蚌肉作脯食亦往往得細珠如粱粟即今之廉珠也乃知珠池之蚌隨其大小悉胎中皆有珠矣而今之取珠蚌者云得之海邊不得於池中也其北海珠蚌種類小土人取其肉或有得珠者色黃白不甚光瑩或即今之藥珠也蚌中又有一種江瑤者腹亦有珠皆不及南海者奇而且多宗奭曰河北溏瀠中亦有珠圓及寸者色多微紅珠母與廉州者亦不相類但清水急流處其色光白濁水及不流處其色暗也熊太古冀越集云禹貢言淮夷蠙珠後世乃出嶺甫今南珠色紅西洋珠色白北海珠色微青各隨方色也豫嘗見蛋人入海取得珠子樹數株狀如柳枝蚌生於樹不可上下樹生於石蛋人鑿石得樹以求蚌甚可異也南越志云珠有九品以五分至一寸八九分者為大品有光彩一邊似鍍金者名鐺珠次則走珠滑珠等品也格古論云南番珠色白圓耀者為上廣西者次之北海珠即藥珠色微青者為上粉白油黃者下也西番馬價珠為上色青如翠其老色夾石粉青油煙者下也凡蚌聞雷則㾭瘦其孕珠如懷孕故謂之珠胎中秋無月則蚌無胎左思賦云蚌蛤珠胎與月盈虧是矣陸佃云蚌蛤無陰陽牝牡須雀蛤化成故能生珠專一於陰精也龍珠在頷蛇珠在口魚珠在眼鮫珠在皮鱉珠在足蛛珠在腹皆不及蚌珠也據近時市上所通用最上者為廉珠即廉州合浦縣珠池所産粒白如粱如粟色白光滑有寶光其次曰藥珠種類甚多即北海所産色白黃有神光者亦佳惟色黑質松者為最次不入藥用蟾酥二蟾蜍生於江湖池澤間其眉間白汁謂之蟾酥以油單紙裹眉裂之酥出紙上陰乾用或以蒜及胡椒等辣物納口中則蟾身白汁出以竹蔑刮下面和成塊干之聞有一種假酥系麵粉及別藥僞造萬不可用炳章按按鮑叔真醫方約說云蟾酥乃治諸毒之要藥也制合得宜傅服皆可用蛤蚆皮即蟾皮也大能收毒外貼不可缺也嘉興縣志云宮中用蟾酥錠於每年端午日修合各坊車蝦蟆至醫院者億萬計往時取用後率斃蓋兩目俱廢不能跳躍也東山朱公典院事命止刺其一偏得蘇者甚多此事似微然發念甚真為德不淺王文謨碎金方取蟾酥法先將牙皂角三兩煎水三沸旋候冷用大口甕或缸盛水將癩蝦蟆不拘多少入中以稀物覆之勿令跳出過一宿其酥即浮水面若未浮其酥即在身上矣可用竹刀刮下用之本草明辨云端午日以大蛤殼未離帶者合於蝦蟆眉上腫處用力一捻剛酥出殼內貯於油紙候乾江南出者為杜酥要無面塊神色起亮光者佳無錫出者中有竹節痕浙江杭紹出者為片子酥粉質少者亦佳山東出者為東酥色黃黑味麻辣不上二層之貨蓋酥本無定色但驗其粉之輕重為衡如看成色以水一碗將酥化開放入水如烏見水即變色水面有泡沫者真僞真見水不動而粉質漸露矣蘄蛇三真蘄州所産之蛇龍頭虎口黑質白花肋有二十四個方勝文腹有念珠斑口有四長牙尾有一佛指甲長一二分胸形如連珠市肆有用本地白花蛇僞充欲辨真僞但視蛇雖乾枯而眼光不陷者為真故羅願爾雅翼有云蛇死目皆閉惟蘄蛇目開如生耳炳章按虞初廣志云蚺蛇大者達十餘丈圍可八九尺為蛇中之最大者故又名王蛇屬動物學蛇類中之闊口類其部分之構造頭部以下軀幹及尾無顯然之判別皮膚中含有色素成特有之體色外皮半脫數之謂之蛇脫此係蛇類之特別機關因蛇類外皮無生長之力故苟軀幹增大勢必脫去之也心臟具二心耳一心室故生理學上之消化作用缺缺而血行遲緩其所以成冷血動物者此也此蛇腹部之下尚存有後足遺蹟由動物學之歷史考之可知其脫變之跡現多産熱帶諸地嶺南亦著皆夙以為貢品如唐書地理所謂廣州土貢鱉甲蚺蛇是也常棲樹上雖無毒齒而筋肉強大能咬殺人畜候獐鹿過者吸而吞之至已溶化即纏束大樹出其頭角乃不復動土人每伺而殺之其所以能吞較己大之動物者即以此蛇無胸骨而體中筋肉可任意張縮也金樓子有楚辭云蛇有吞象其大如何之句或謂指巴蛇或云即指此也埤雅云蚺蛇尾圓無鱗身有斑紋故如暗錦纈似鼉行地常俯其首膽隨日轉上自近頭中自近心下自近尾蚺蛇肉俗謂食之闢蠱毒其牙長六七寸土人云利遠行避不祥每枚值牛數頭其說亦見於括地志然最貴者為膽能療疾唐時敕令桂賀泉廣四州輪次以進段公路亦云廣州南海縣每年端午日嘗取其膽貢進蛇則諸郡採送事參親看出之鄭重如此實則由身中具一種特別之液體利去風濕諸疾其皮性堅韌或鞔鼓今潮州亦有為之者其聲絶類象皮鼓蓋蚺蛇全體殆無一非有用之材也故叔夜養生論云蚺蛇珍于越土而南裔異物志亦云蚺惟大蛇既洪且長彩色駁犖其文錦章食豕吞鹿腴成養創賓亨嘉食是豆是觴皆駁之也特晉中興書所云顏含嫂病困須蚺蛇膽不能得含憂嘆纍日忽一童持青囊授含乃蛇膽也其他如簪云樓雜記云沈公某其鄉人也明萬曆間巡撫滇南初至文武來謁有參將貌甚醜陋厥首僅存白骨絶無額准輔頤惟目光爍爍騰注公大驚獨留問故自言茲地蚺蛇千歲以上者高數丈亙四五里恆宵遊遇豺虎諸獸則吸而吞之其於人亦然某曾夜歸覺為風攝去蹶趨如坐丹爐中萬火齊發腥穢且逼人某疑入蚺蛇腹矣亟抽刀割之約厚五六寸任此蛇撼天搶地奔躍數十里外經時才出而此蚺蛇己死某通體殷紅頰上皮肉俱盡倦而寐及寤始疼閲半載方愈此約長五里山中人競取脂燃燈鱗火如笠云據前辨蚺蛇乃産兩廣深山熱帶地者故其形甚大我浙江金衢嚴等所産亦多惟大者絶少是蛇一日中惟午時閉眼其捕法以長竹竿端繩圈打於叢草上如下有蚺蛇則草經打搖動而蛇遂直立欲撲狀即以繩圈套於蛇身抽緊則蛇將繩纏緊遂持竹竿於石上將竹竿壓於蛇上以利刃剖蛇腹去腸臟以竹槍撐而曬乾惟膽亦取出收藏以作藥用鄭君有言以白花蛇僞充白花蛇甚小重不及兩干蚺蛇大者十餘兩小者五六兩斷不能可充且白花蛇價昂蚺蛇十倍惟初生小蚺蛇充白花蛇或亦合理惟斑紋亦有不同耳紅點蛤蚧四蛤蚧生於嶺南山谷及城牆或大樹間形如大守宮身長四五寸尾與身等自惜其尾見人取之多自齧斷其尾而去藥力在尾尾不全者不效北戶録云其首如蟾蜍背緑色上有黃斑點如古錦紋其聲最大蘇頌云入藥肆須雌雄兩用最靈或云陽人用雌陰人用雄雷斆曰雄為蛤身小尾粗雌為蚧皮細口尖身大尾小氣味鹹平有小毒治虛勞嗽喘助陽益精大有奇功李珣曰凡用須炙令黃色熟搗口含少許奔走不喘息者為真也今市肆有一種紅點蛤蚧者有大毒萬不可服用者須揀尾全者細驗皮色有無紅點方可入藥炳章按檐曝雜記云蛤蚧蛇身而四足形如虩虎身有瘢五色俱備其疥處又似蝦蟆最臭惡余初入鎮安路傍見之疑為四足蛇甚惡之問土人乃知為蛤蚧也郡衙傍山處處有之夜輒聞其鳴一聲曰蛤一聲曰蚧能叫至十三聲方止者乃佳其物每年一聲十三聲則年久而有力也能潤肺納氣壯陽益氣口咬物則至死不釋故捕者輒以小竹片嬲之使咬即攜之來雖已入石縫中亦可乘其咬而掣出也遇其雌雄相接時取之則有用於房中術然不易遇也藥肆中所售兩兩成對者乃取其兩身聯屬之耳其力在尾而頭足有毒故用之者必尾全而去其頭足鄭君云紅點或指活時言其活時身上五色俱備在市上通行者色皆青緑色有鱗靨而無紅點也蘇蜈蚣五蜈蚣以蘇州産者為良聞蘇人採取生草堆積腐爛日久便生爆干外貨背光脊緑足赤腹黃此易辨物也舍蜈蚣均不可用市肆有以本地所産混售聞有一種千足蟲一名馬陸形最相似若誤用之並把著腥臭氣入頂皆能毒發致死不可不慎炳章按蜈蚣江蘇蘇州洞庭山出者多頭紅身黑有光大者最佳常州吳江縣鍋山出者少頭紅身黃色略次四川出者頭黃褐色身黑褐色小多力薄亦次浙江餘姚縣出者頭亦紅身黑褐色略次大抵用者須擇長大頭尾全全身黑而有光者為道地項元鱗曰近時有一種千足蟲其形相似惟頭上有白肉嘴尖者最毒不宜作蜈蚣用絳緯六用洋紅染輕麻僞充以指蘸水略搓便見按絳緯乃紅花所染紅花苦溫入肝經血分絲為蠶之精氣可以熄內風製為緯又取其通絡故古方肝著湯用之輒驗若以洋紅染造則失之遠矣況洋紅有毒乎尤可恨者近日醫家疏方已經旁注洋紅染不可用而貪利之徒偏以此欺騙病家是太無天良者矣炳章按絳緯如系真紅花水染者滾水泡之永不變色入罐煎過則成黃色者真若用洋紅染者水泡其水即紅以此分辨萬無一失䗪蟲七非蔗蟲䗪蟲本經名地鱉別録名土鱉形扁如鱉有甲不能飛小有臭氣此物好生鼠壤及屋壁地棚之下氣味鹹寒有毒專破癥瘕考仲景金匱鱉甲煎丸用之治病瘧日久結為癥瘕大黃䗪蟲丸用之治虛勞腹滿內有乾血下瘀血湯用之治産後腹痛內有瘀血土瓜根散用之治經水不利少腹滿痛以其消癥而破瘀也去冬因用蔗蟲以催痘漿調查各藥鋪方知所制鱉甲煎丸大黃䗪蟲丸皆用蔗蟲以訛傳訛皆由吾國藥劑師互相傳授未讀方書不明本草以致貽誤匪少堪發一嘆不觀夫古人制字䗪字其下從蟲蔗字其上從草或作樜旁從木足證明蔗蟲由草本而化生非如䗪蟲之從濕土而出也又按蔗蟲氣味甘微寒為發痘行漿托癰清毒之妙品且能化痰醒酒和中利小便産廣東潮州及福建漳泉蔗田中形如蠶蛹食蔗根而化生土名蔗蛄其味甘美土人有用之以佐酒席考本草拾遺及南京醫學報均有發明可見䗪蟲與蔗蟲性味不同形質亦異古人定方用藥各有主義胡得妄行配製以失效用伏望熱心同道與藥商知好者將此通告苦勸改良幸勿再蹈故轍是所跂禱炳章按王士雄云潮州蔗田接壤食蔗之蟲形如蠶蛹而小味極甘美性涼解熱毒助痘漿可與蘭蟲並傳施可齊閩雜記云漳泉各處二三月間市上賣生熟甘蔗蟲甘蔗老根中生也生者如蠶而細灰白色光潤無茸毛熟者以油灼過拳曲如蜂淡黃色味極鮮佐酒尤佳考甘蔗性寒故王維謝賜櫻桃詩飽食不須愁內熱大官還有蔗漿寒此蟲既生蔗中宜亦性寒矣而吾鄉醫者治小兒痘漿不起多用之或有云性熱本草不載不能辨也又據兩般秋雨庵隨筆載姚承憲詠甘蔗蟲詩蘊隆連日賦蟲蟲渴念寒漿解熱中佳境不須愁有蠱庶生原可慶斯螽似誰折節吟腰細笑彼含花蜜口空畢竟冰心難共語一樽愁絶對蠻風玩詩次句似亦謂其性寒惟云蘊隆連日則是夏月方有詩在粵中所作豈粵中夏月始賣而漳泉獨早在二三月耶而鄭君出産時期亦未辨明惟氣味甘微寒發痘行漿等效用確與王施二君發明吻合鄭君所言可見皆從實驗吾於斯益信惟䗪蟲確是地鱉蟲即仲景大黃䗪蟲丸等用之以化癥瘕去瘀血端不能以甘蔗蟲代之吾謂以後業藥者暇時亦閲覽本草參對方書庶不致再誤人命矣獸部附人部一種犀角一用黑兕角及水牛角雕琢形似假造混售鑢便之粉或鋸便之屑更難辨別按李時珍云犀出西番南番滇南交趾諸處有山犀水犀二種水犀出入水中尤難得弘景雲入藥惟取雄犀生者為佳若犀片及見成器物已被蒸煮不堪用宗奭云鹿取茸犀取尖其精鋭之力盡在是也用者當揀選角質烏黑肌皺摺裂光潤者錯屑入臼杵細研末或當面鑢粉或取頂尖磨水取汁尤佳再李珣有云凡犀角鋸成當以薄紙裹於懷中蒸燥乘熱搗之應手如粉此法今人鮮知故罕用耳炳章按嶺表録異云犀牛似牛形而豬頭腳似象蹄有三甲首有兩角一在額上為兕犀一在鼻上較小為胡帽犀鼻上者皆窘束而花點小多有奇紋牯犀亦有兩角皆謂毛犀俱有粟紋堪為腰帶千里犀中或有通者花點大小奇異固無常定有編花路通有頂花大而根花小者謂之倒插通此二種亦五色無常矣若通處白黑分明花點差池計價巨萬希世之寶也豫久居番禺諸犀各曾經眼又有墮羅犀犀中最大一株有重七八斤者云是牯犀額上有心花多是撒豆斑色深者堪為胯具斑散而淺者即治為杯盤之用又有駭雞犀群雞見之驚散闢塵犀為婦人簪梳塵埃不著發闢水犀行於江海水為開置角於霧露中紅久不濕光明犀置暗室自光明也此數犀但聞其說不可得而見也録之以備參考海島逸志云犀牛大過於牛皮如荔殼而紋大如錢背皮如馬鞍以覆其項頭似鼠嘴似龜足臃腫如象好行荊棘中喜食藤刺頭一角在鼻梁世所繪其角在額者非也此余所目見其行林中觸樹多折此頭一角或即牸犀也沈萍如雲犀角本草載出西番南番滇南交廣諸處有山水兕三種山犀易得水犀難見並有兩角鼻角長而額角短水犀皮有珠甲山犀則無兕即牸犀止一角在頂紋理細膩斑白分明不可合藥蓋牯角紋大而牸角紋細也其紋如魚子形謂之粟紋紋中有眼謂之粟眼黑中有黃花者為正透黃中有黑花者為倒透花中復有花者名重透併名通犀乃上品也花如椒豆斑者次之烏犀純黑無花者為下品其通天夜視有光者名夜光犀能通神又有角上有紋直上至端夜露不濡者名通天犀羌海雜志云犀牛皮厚而無毛鼻上生前後兩角後之所産只有一角為解熱之特效藥且亦自能解角角藏於巖穴中獵人以如其形木角易之則次年解角仍藏原處否則更易他處不復再見矣今就市上所通行者惟暹羅角為最佳品其外有槽根盤內有蜂窠形中凸出如墩兩畔陷紋粗刨片白多黑少為上品交趾産者外無槽內無墩紋較細者次之又有一種天麻角性硬再次雲南産者角尖長其氣臭最次凡犀角為熱證中之退熱特效藥關係人命生死非尋常藥可比必須採辦的真暹羅角為要須看色黑劈開處直紋粗絲者為妙尖上頭圓更佳試法以真犀角置為酒器則清香為異耳沈萍如雲犀角以有花紋而粗者為貴今市人多以雲貴山中野牛野羊角僞之其角黑而無花紋且氣膻耳此等僞角害人生命不宜用之羚羊角二羚字古作麢今省筆作羚用白兕角及白牛蹄琢磨僞充其現切之羚角絲尤難辨識按羚羊産梁州真州各處商洛諸蠻山中及秦隴西域皆有角長尺余有節特起環繞如人手指握痕得二十四節者尤有神力今多用尖取其精鋭堅剛之力也宜揀選地道頂尖磨水取之用之尤靈炳章按羚羊不獨真僞須辨而鎊法亦須改良吾紹藥業有見於斯民國十四年二月間囑余撰浸鎊改燥鎊理由書已刊登第十五期紹興醫藥月刊茲再摘録於下考麢羊俗作羚羊屬脊椎動物哺乳類有胎盤類反芻偶蹄類羚羊科形似小鹿性至靈故字從鹿從靈藏器云羚羊有神夜宿防患以角掛樹不著地但角彎中深鋭緊小有掛痕者為真疏慢無痕者非也按羚羊形雖似鹿又類山羊口吻尖鋭面部三角形耳輪大眼有光頭上皆有長圓無枝之短角從眉間伸出間有曲輪或略捲曲或向後鉤曲角基中空角心如筍一次脫落自落者為死角不再生毛柔滑而密色概灰黑或褐黑色背部與前膊間灰褐色四肢細長概黑褐色尾短蹄小身瘦狹體長約四尺棲於深山常群棲性溫順有深慮善疾走及跳躍嗅覺敏鋭具靈異之性終身愛護其角故其精神亦凝聚於角以角入藥能清熱熄風舒筋解毒明目透疹驅邪辟蠱子癇痙厥猶為要藥産於亞美歐臺灣安南者類別有十餘種之多産中國者如陝西哈密外福化城新疆奇臺縣為最佳鞏昌漢中者次亦有黑白二種黑者清腎肝熱白者清肺熱熄風近年以白者為重故市上僅有白羚羊黑者多無覓詎知近年藥用漸繁捕獵殆盡因而價值日昂且羚羊質性堅硬刀切不入我業習俗以形式相競鎊片入藥以求雅觀查其鎊片之法先將羚羊水浸七八日再用滾水泡透經此手續化堅為軟則鎊之片張闊大形式雖雅觀然經水浸泡汁液盡出性味已失反增腥臭惡氣治病功能已大半消失嘗考古人修治羚羊之法先用鐵銼銼細再搗篩極細更研萬匝入藥免刮黏胃腸使原質不失效力完固法良意美同人等審度近日人心不齊一經研末真僞難辨難免以僞亂真則害人更甚我同人等本良心之主張為改革弊害起見邀集同業行店在會館集議述明羚角浸鎊弊害原理經衆討論僉謂不落水燥鎊庶幾性味不失真僞仍可鑑別為全體所公認惟燥鎊片張雖碎小主治效能實較浸鎊優勝十倍云下略麝香三麝形似獐而小色黑常食柏葉及蛇蟲其香在臍故名麝臍香又名當門子生陰莖前皮內別有膜袋裹之至冬香滿入春臍內急痛自以爪剔出覆藏土內此香最佳但不易得今惟得活者看取必當全真出羌夷者最好出隋郡義陽晉溪諸蠻中者亞之出益州者形扁多僞凡真香一子分作三四子刮取血膜雜以余物裹以四足膝皮而貨之今貨者又多僞聞土人多以香貓腎僞充考劉侑西域記有云黑契丹出香貓糞溺皆香如麝氣故有取其糞用雜獸血腰僞造為麝香近又以荔核煅為灰裝入真麝香皮袋中混售貽害不淺凡入藥須辨真者用之炳章按麝香為獐鹿類而無角其尾甚短如山羊嘴上之稜牙如野豬其種大小不一皮毛之色生而數變初醬色與褐黑色繼變紅褐至白灰色而老矣全身生毛惟嘴無毛須其旁面有繼長之斑點背多橫紋然形狀雖笨而腿力甚速故獵捕甚難腹下之臍即名麝囊割破其囊即得麝香矣其肉因香氣芬烈土人視為美味其囊之大小關乎麝之年歲與強弱産地首推西藏高山中或喜馬拉亞山以及云貴等省之山內東三省與蒙古亦産之黃河以南雖産似麝其實本草所謂香貍非麝也羌海雜志云青海江拉希拉之間重岩復澗産麝尤多大抵山有香麝必有香氣遠聞之香烈而略帶腥忽隱忽現若即若離麝穴愈近而其腥愈不可聞循其氣味而尋之百不失一麝臍最穢常流血液天日晴時必仰臥於草地而曝其臍臍眼突出大如鉢腥臭異常蚊蠅蟻蚋飛集蝕之臍眼突然縮入微蟲碾如齏粉一日數次脂漸凝厚此謂草頭麝藥肆常用之品也曾吸入蜂蠍蜈蚣毒蟲類者臍有硃砂點謂之紅頭麝其品已高最貴者曰蛇頭麝毒蛇吮其臍麝驚痛而力吸跳踔狂奔蛇身伸屈盤結堅不可脫須臾蛇身截然而斷首即腐爛於內矣臍有雙紅珠是為蛇眼得此配藥其香經久不散醫治毒症功效無比繆仲淳云香有三品一曰遺香是麝臍閉滿自於石傍用蹄尖揮落者為最佳其地草木枯焦二曰膝香亦佳三曰心急香被諸獸驚恐遺落收得見心流脾結作一血塊隔山間亦有香氣此三香皆為佳品今時以陝西哈密出者其色黃香味濃厚者佳山西五臺山羊來出者其殼如豬脬亦佳四川松盤山出名蝙蝠香皮厚有毛亦佳雲南有一種無殼散香色黑有騷氣者次大抵聚於蜀之打箭爐者名川香聚於雲南者名云香陝西之蘭州者名芥州香皆良其形圓香氣濃厚歷久不散産於張家口以外歸化城以及內外蒙古者名西口蝙蝠香産於東三省聚於營口者名東口蝙蝠香其形皆扁氣味微薄而帶騷氣略次蓋麝香真色乃紫紅與墨色近世作僞者將少許蝙蝠香雜以多數之香料屑末攙入且加以相當之顏料形似真者倣佛辨別真僞者大抵鼻嗅香氣芬烈與微薄以香料之香與麝香之香顯能分別況真者氣味不但襲人且日久不散僞者香不能襲人稍久嗅之已乏香氣尚有試法亦可主判真僞以熾炭火上將香少許彈於炭火上真者如燃人發其質爆烈奇香四溢僞者不但無香且質如灰燼而爆烈以此試之立分真僞麝香內結有圓粒或長扁形外紋光滑質堅碎之香氣逾常即名當門子其功力較散香勝數倍亦有人工造作者亦可試之將當門子泡滾水內真者依然堅結僞者即化開矣牛黃四僞者味苦不香真者味甜氣香真牛黃大者如雞子黃小者如龍眼核重疊可揭其質輕虛氣香有寶色者佳如黃土色者下也出産川蜀者為正地道喝取者為上殺取者次之能辨真牛黃則假者無論若何造法可一驗便知耳炳章按牛黃者牛之病也蓋牛食百草偶誤食壅氣之草以致胃腸壅滯鬱極生火火炎肝膽則肝失疏泄膽汁外溢凝結成黃而胃少膽汁則食物不化而不嗜食故肌瘦肉消黃者乃膽汁日溢胃中甜肉汁自外層結受熱蒸燥則凝結成顆成塊漸結漸大而黃成矣故黃多生於肝葉傍膽側際或另生皮囊裹之或生膽之厚皮處或生角中角竅亦屬肝故也其味苦兼甜者膽汁與甜肉汁之結晶體也其氣馨芳者百草之精氣也其通竅化濁清火化炎者此膽之擅長本能也用以治人心膽之疾者同氣相求之義也然其性涼而有小毒能治驚癇寒熱中風痰迷有餘之熱證者乃以毒攻毒也此發明生黃之理治病之原取黃之法辨黃真僞再辨於下羌海雜志云牛黃有家黃野黃之分家畜犛牛犏牛皆能生黃凡牛腹生黃食草不貪行走不捷日漸瘠立兩眼胞皆黃色或眼如血色或夜分身有光或鳴吼以恐驚人計其吐黃之期須終日按其脈而伺之仰系之則不吐俯系之則隨吐隨食必俯系之而以牛舌不能及地為率又須防其蹄躋也吐黃以後牛體膘健逾恆如逾期不吐牛必倒斃剖腹取之黃無精氣非上品也凡藥肆之常有者大抵系家牛所吐及剖腹所得者為多名曰牛黃然真西黃則惟巖穴叢草中遇之蓋犀牛吐黃亦隨吐隨食惟吐藉草之上吮食不淨余液下漏沉入土中也然探其穴藉草之下有土光滑可鑑者掘之始有犀黃然亦不多家牛黃者色淡黃紋理細真犀黃者金黃色紋理粗暑天蚊蟲不集湯初沸時捻末少許撒之沸湯頓無巨泡矣取黃染指透爪甲者亦佳古人其取黃又名照水以盆注水承之夜俟其吐水中喝逼而取之為生黃亦佳昔以隴西山西出者著名故曰西黃即牛黃也産奉天省地屠牛廠及興京桓仁寬旬東豐吉林黑龍江省等均産皆名東黃亦佳近今所謂廣東黃者皆馬黃也蘇尖牛黃即水牛之黃也近代駱駝黃亦充牛黃然考駱駝之黃其形態與功用確類真牛黃凡治驚癇風痰熱痰而功稍遜惟氣不馨為異耳惟駝亦食草食亦反芻與牛相類耳至所謂片黃者類皆南省所産之蟒黃是也不堪入藥宜禁除之杜膽星五僞名京膽星或云即江南土製色有花點不黑質極硬不軟不知何物僞造誤人不少按膽星即天南星生研為末臘月取牛黃膽汁和藥納入膽袋中懸有風處干之年久者彌佳南星氣味苦溫有大毒牛膽汁苦大寒無毒以牛膽汁制南星所以殺燥烈之性而並解其毒蘇頌云治驚風有奇功匪特除痰下氣攻積也若僞制射利貽害多已炳章按製造膽星法臘月黃牛膽汁拌漂淨生南星研細末如稀糊仍入膽皮內懸掛有風無日處陰乾至次年將皮剝去再研細用新臘牛膽同前製法曾手製至三年其色猶黃白至九年才褐色耳此沈萍如法其他如本草明辨製法略異方亦録下以備參考擇臘月庚申日以漂天南星川貝母各半研極細末以黃牛膽一具上開一孔不令汁出將二味和入於膽中懸掛檐前風日之中候乾去膽皮另換一膽如是者九次苟能一年一次九年成功者最佳今市上所售色黑如漆者乃小元參研末搗蜜如餅裝入雞肚內曬乾充用害人匪淺鹿茸六鹿茸頂尖帶血者謂之血柿茸價值甚昂聞射利之徒或用豬尾或用小腸和以豬血攙以雜藥假造僞充外形與真無二及煎熬之後則糜爛臭穢可驗而知之若研末入丸藥甚難辨識按鹿茸氣味甘溫無毒主治漏下惡血寒熱驚癇益氣強志生齒不老為補骨血益精髓之要藥麋茸尚不可用又安用此假柿茸耶若遇危險重症服之則貽誤必多矣炳章按茸者如草芽初生之狀麋鹿雌者無角雄者之角年解年生乘其初生含血未成骨時取以為補精血藥因其狀命名也惟採茸之法貴乎始生含血者漸長則成角不適用故云宜如茄之小者分歧則大而不取此舉茸生初久形分大小而言非可指為鹿之大小解也凡具氣血者幼則弱老則衰惟壯大者則強是麋鹿之茸正當取於壯大之麋鹿為貴當取其頭骨大而茸豐肥如馬鞍形橇形者為最至茄茸則太嫩而小寇宗奭已論之矣再論採取之法羌海雜志云茸鹿一種天下盛稱關東其實製法以西産為良品質亦不及西産之厚也然西産製法亦未嘗不佳最上者亦曰旋茸其法得一生鹿閉於柵聚圍之而呼噪鹿性躁驚距奮擲足無停蹄其體純陽兩角更甚約數小時其熱度達於極點有力者粹入以利刃斷其首長杆丈餘上穿鐵環綴八尺之鐵鏈而以鹿角系其端極力搖而旋轉之甲疲乙易乙疲丙易不知其數千萬轉其精血靈活和勻無孔不入無竅不通稍停則精血凝聚之處易生微蟲精血不到之處元氣不足非全材矣此青海採製鹿茸之法也此指家畜而言如遇野山之鹿即隨時又獲取茸攻效尤偉李春芝云麋鹿俗呼梅鹿尤有馬鹿之分二鹿均能生茸皆有臘血片大抵麋鹿解角後其新茸芽生之際初起如銀杏狀漸成梨形及核桃形名曰血包此為第一期再則支生兩凸如茄子形或如鞍子形名曰扈子鞍子稍養數日急宜取用此為第二期倘逾此期即為又子此為第三期即毛角也血液枯燥功效已薄上述麋鹿生茸關於時際之遲早以區別其形狀之良窳再別其每架鹿茸切片時復有蠟片血片風片骨片之分如茸之頂尖最首層之白如蠟油潤如脂名之曰蠟片次層白中兼黃純系血液貫注其中故名曰血片最次層片有蜂巢色紫黑透孔名曰風片俗云木通片如木通之空通也最次則與骨毗連同角相仿名曰骨片效力更薄矣凡辨原架鹿茸之法須顏色紫紅明潤有神頂圓如饅頭式者佳如色帶黃黑頂上凹陷者次東三省産及青海新疆均佳浙江衢州金華出亦佳僞者以鹿茸架用豬血麵粉做成鹿角膠七鹿角膠原名白膠以鹿角寸截米泔浸七日令軟再入急流中浸七日刮去粗皮以東流水桑柴火煮七日頻頻添水取汁瀝淨加無灰酒熬成膏冷則膠成矣氣味甘平主治傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎市肆有以牛皮煮為膠僞充一層白色俗名白頭氣味膻臭黏濁服之有害炳章按鹿之種類有三陸佃云鹿之大者名麈群鹿似其尾為趨向其尾可作拂塵今北人呼為大尾鹿者是也李瀕湖以麋似鹿而色青黑大如小牛肉蹄其目下有二竅為夜眼之說證之似略有據然未曾實指其角解於冬也清高宗帝有鹿角記言之詳矣因二物俱解角於夏乾隆丁亥長至齊宿南郊命侍臣詣南苑聚木蘭之鹿吉林之麋大尾之麈監視之及五時而麈之角解麋鹿皆不解隨傳旨欽天監改月令之麋角解為麈角解此經頒示天下而人民所共知者也是麈之尾與麋鹿殊而角解於長至地學雜志云麈俗稱為四不像蓋其形似鹿而牛身馬尾羊蹄特其首類鹿耳故得此名稱清聖祖嘗在靈囿中實驗此物而改夏小正鹿角解之訛若麋與鹿即李瀕湖所言麋肉蹄四眼之說亦猶黃牛之於水牛形稍殊而其實一物也且朱子之注孟子亦曰麋鹿之大者未嘗分為二也李春芝云麋鹿俗名梅花鹿尤有馬鹿之分亦屬同類異種耳新疆雜記云麋鹿北疆概産之每冬季多狩獵者其角於小滿節後角根發癢以頭相觸角即脫落堆於一處獵者於深山中有一獲數百對者脫角後越五六日新茸即生此時最為貴重産於拜城之額什克巴什山漢騰格里山若焉耆之納刺達嶺俗稱之曰鹿圈言其産鹿之多也即品質言尤以産於伊犁之果子漢者為最佳行銷於內地各藥行大抵關東出者其角外皮黃黑色內白色有神光為最佳湖廣桱縣出亦佳福建陝西出有雙角單角之分雙角老者亦佳單角次之海南丹山出者無杈枝亦次又外洋淡水中出魚角又名沙角為鯊魚所變其色枯白而大杈枝甚多為最次其他煎膠之法用正鹿角鋸斷每段約二寸另通淨角內灰質洗淨煎七晝夜停火取出骨渣候冷濾淨再熬至滴水成珠取起入方錫盤中候凝結成塊取出以刀切塊貯藏三年發售名鹿角膠是也龜鹿二仙膠八龜鹿二仙膠用龜版鹿角枸杞人參四味煎熬為膠乃峻補氣血不寒不燥又能益髓固精為補方中妙品聞有以牛皮膠及他藥僞造混售服之無益有害良可慨耳炳章按龜鹿二仙膠即鄭氏所謂龜鹿加枸杞子黨參煎汁去渣如前法收膠切塊毋容再詳矣云僞者以牛皮僞充云云牛皮膠甚臭不堪入口亦難混用耳阿膠九僞名上清膠又一種名瑞芳膠皆用尋常之水煎牛皮成膠並雜他藥僞造色雖明亮氣臭質濁不堪入藥張隱菴本草崇原辨之最詳據古法先取狼溪水以浸黑驢皮後取阿井水以煎膠考狼溪發源於洪範泉其性陽阿井水發源於濟水其性陰取其陰陽相配之意火用桑柴煎煉四日夜而後成膠近時阿井水甚不易取而煎法又失其真故真阿膠最難得也貨者既多贋僞辨之不明不如不用為是或第用江浙所煮黑驢皮膠雖無阿井之水而用寶莊之泉其補血滋陰平木熄風功同阿膠較之用假阿膠者不更勝一著耶炳章按阿膠出山東東阿縣以純黑驢皮阿井水煎之故名曰阿膠考阿井在東阿縣城西縣志云昔有猛虎居西山爪刨地得泉飲之久化為人後遂將此泉為井然此水實為濟水之源其色緑其性趨下東阿城內又有狼溪河其水為漯水之源乃洪範九泉之水所會歸其性甘溫故合此二水制膠為最善再按定每年春季選擇純黑無病健驢飼以獅耳山之草飲以狼溪河之水至冬宰殺取皮浸狼溪河內四五日刮毛滌垢再浸漂數日取阿井水用桑柴火熬三晝夜去滓濾清再用銀鍋金鏟加參耆歸芎橘桂甘草等藥汁再熬至成膠其色光潔味甘鹹氣清香此即真阿膠也據本草經云阿膠性甘溫清肺養肝滋腎益氣補陰祛風化痰潤燥止喘善治虛勞咳嗽肺癰吐膿吐血衄血腸風下痢崩帶胎動經水不調及肺毒癰疽一切風症服之無不效驗其僞者以碎舊牛馬雜獸皮煎成膠塊色亦不如阿膠名曰清膠味利者以此炒成珠曰阿膠珠此等贋品服之不但無效而反發瘡生毒因雜皮多器用皮含有毒汁故其為害甚烈大抵鑑別之法真阿膠煬化後氣清香有麻油氣汁色黃白色稠而不黏膩味甘微咸其原塊在十年以內者蒼翠色質尚堅至五六十年以上者色轉黃而質鬆脆更佳肺勞服之殊有奇功若本煎驢皮膏煬化氣微腥陳則無腥氣汁黑褐色其黏膩味亦微咸兼甘用作補血藥亦佳以治肺病血病則凝胃反不佳也若清膠化煬純屬臭穢腥濁氣令人欲嘔服之有毒切勿沾唇戒之戒之血餘炭十血餘炭本經列於中品氣味苦溫無毒主治五癃關格不通利小便水道療小兒驚大人痓仍自還神化本草崇原云凡吐血衄血之症皆宜用血餘當用發髲近於頭皮之發剃下短髮尤佳或用亂髮亦可以皂莢水洗淨入瓶內固濟煅灰存性方合經旨近市肆有一種假余炭不知何種獸毛所煅色暗味臭萬不可用若重症服之誤人匪淺噫至便之藥亦有假充為醫者能不寒心束手乎炳章按古人造血餘法臘月取剃下短髮以皂莢水洗去泥垢入甕均鹽泥封固外用礱糠火煅一晝夜候冷取出用近時以兩鐵鑊相合亦用鹽泥封口用桑柴文火上鑊臍放米數十粒俟米焦熄火候冷透開取則血餘黑亮鬆脆其質輕無臭氣若煅未透則質堅重極臭惟不能走氣若走氣則變灰無用矣近時昧利者以人發一毗再夾細石砂一毗煅如前法形色亦光黑而亮惟質甚重不如純血餘之輕也
